<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/order_layout}"
	  layout:fragment="Content"
	  th:with="subPageTitle ='약관동의'">

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
 
 <script>
	
	
	$( document ).ready(function() {
		 $('#frmName').val( $('#orderNm').val());
		 $('#frmPhone').val( $('#orderPhone').val());
	   
	});
	
	
	function goPersnalAgreement(){
		var url = window.location.protocol + '//' + window.location.host + '/inc/agreement/persnalAgreement.html';
		window.open(url, '_blank');
	}
	function goThirdAgreement(){
		var url = window.location.protocol + '//' + window.location.host + '/inc/agreement/thirdAgreement.html';
		window.open(url, '_blank');
	}
	
	
	const pattern = /^(01[016789]{1}|02|0[3-9]{1}[0-9]{1})-?[0-9]{3,4}-?[0-9]{4}$/;

	function telValidChk(tel) {
		if(pattern.test(tel) === false) { return false; }
	    else { return true; }
	}
	
	
	//상담 신청 modal, commit
	function goApplyCommit(){
		
		var inputPlanId 			= $('#planId').val();
		var inputUserId 			= $('#entrUserId').val();
		var inputUserName 			= $('#frmName').val();
		var inputUserPhoneNumber 	= $('#frmPhone').val();
		
		if(!telValidChk(inputUserPhoneNumber)){
			alertModalShow('', '정확한 번호를 입력해주세요.');
			$('#frmTitle').focus();
			return;
		}

		if($.trim(inputUserName) == '' ) {
			alertModalShow('', '이름을 입력해주세요.');
			$('#frmName').focus();
			return;
		}

		var params = {
						reqUser 		: inputUserId
						,inputPlanId 	: inputPlanId
						,inputName 		: inputUserName
						,inputNumber 	: inputUserPhoneNumber
						,siteSp 		: '01'
					}
		
		$.ajax({
			url : '/pmb/internetreq/create'
			,type : 'POST'
			,dataType : "json"
			,contentType:"application/json"
			,data : JSON.stringify(params)
			,beforeSend: function(xhr){
				xhr.setRequestHeader(header,token);
			}
			,success: function (data) {
				
			}
			,error : function(request, status, error){
				alertModalShow(error,"");
			}
			,complete:function(){
				
				$("#ToAlertModal").trigger('click');
			}
		});
		
	}
		
	
	function goMypage() {
		window.location.href="/users/mypage";
	}
	
	
 </script>
</th:block>

<!-- Container -->
<main role="main" class="container">
<th:block th:include="pages/order/incOrderForm :: orderFormFragment"></th:block>
<!-- content -->
	<div class="content F-QU-page F-QU01-13-page">
		<!-- 간편개통 섹션 -->
		<section class="complete-sec">
			<div class="sec-inner">
				<div class="complete-wrap">
					<i class="ui-icn icn-140-complete" aria-hidden="true"></i>
					<strong>간편 개통 신청이 완료되었어요!</strong>
				</div>
			</div>
		</section>
		<!-- // 간편개통 섹션 -->

		<!-- 플로팅 섹션 -->
		<section class="floating-sec">
			<div class="sec-inner">
				<button type="button" class="ui-btn btn-action primary" onclick="goMypage();">
					<span>신청한 요금제 확인하기</span>
					<i class="ui-icn icn-20-link-wh" aria-hidden="true"></i>
				</button>
				<!-- <button type="button" class="ui-btn btn-action primary" data-bs-toggle="modal" data-bs-target="#FI0101P01Modal" th:if="${planInfo.imageBadgeItComb}">
					<span>인터넷 결합하고 알뜰폰 할인하러 가기</span>
					<i class="ui-icn icn-20-link-wh" aria-hidden="true"></i>
				</button> -->
			</div>
		</section>
		<!-- // 플로팅 섹션 -->
	</div>
	<!-- // content -->
</main>

	<!--
		[모달 가이드]
		모달 효과 : fade (공통)
		모달 기본 : modal
		모달 유형 : modal-full / modal-basic / modal-alert / modal-confirm / modal-select
		화면 이름 : 화면아이디-page (modal-select 제외)
		// 1차 수정 : fade-pc 사용안함, fade 공통으로 사용
	-->
	<!-- 인터넷 상품 상담 신청하기 modal basic -->
	<div class="modal modal-basic fade" id="FI0101P01Modal" tabindex="-1" role="dialog" aria-labelledby="FI0101P01ModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content F-I01-01-P01-page">
				<div class="modal-header">
					<h3 class="modal-title" id="FI0101P01ModalLabel"><p id="choiceMNOtext1"></p></h3>
					<button type="button" class="ui-btn btn-close" data-bs-dismiss="modal" aria-label="Close">
						<i class="ui-icn icn-32-close-bk" aria-label="닫기"></i>
					</button>

				</div>
				<div class="modal-body">
					<!-- 상담신청 섹션 -->
					<section class="consult-frm-sec">
						<div class="sec-inner">
							<div class="sec-header">
								<h4 class="sec-tit">빠르게 연락드릴게요.</h4>
							</div>
							<div class="sec-body">
								<div class="consult-msg">
									<i class="ui-icn icn-14-noti-gr" aria-hidden="true"></i>
									<p>이미 <span id="choiceMNOtext2"></span> 인터넷을 쓰고 계시다면 사은품은 지급되지 않아요. 사은품은 신규가입자 대상이에요.</p>
								</div>

								<!-- 등록폼 -->
								<div class="consult-frm">
									<!-- 이름 선택 -->
									<!-- input.scss: ui-input, ui-textarea, ui-sel, ui-file -->
									<div class="frm-field">
										<div class="frm-title">
											<label class="tit" for="frmName">이름</label>
										</div>
										<div class="frm-content">
											<div class="ui-inp">
												<input type="text" name="" id="frmName" value="" placeholder="이름을 입력해 주세요." title="" class="inp" />
											</div>
										</div>
									</div>
									<!-- // 이름 선택 -->

									<!-- 전화번호 입력 -->
									<div class="frm-field">
										<div class="frm-title">
											<label for="frmPhone" class="tit">전화번호</label>
										</div>
										<div class="frm-content">
											<div class="ui-inp">
												<input type="tel" name="" id="frmPhone" value="" placeholder="전화번호를 입력해 주세요." title="" class="inp" oninput="inputTelNo(this)"/>
											</div>
										</div>
									</div>
									<!-- // 전화번호 입력 -->
								</div>
								<!-- // 등록폼 -->

								<div class="consult-links">
									<button type="button" class="ui-btn btn-texted" onclick="goPersnalAgreement()"><span>개인정보 수집 이용</span></button>
									<button type="button" class="ui-btn btn-texted" onclick="goThirdAgreement()"><span>개인정보 제3자 제공</span></button>
								</div>
							</div>
						</div>
					</section>
					<!-- // 상담신청 섹션 -->
				</div>
				<div class="modal-footer">
					<button type="button" class="ui-btn btn-action primary" onclick="javascript:goApplyCommit();" id="modalBlurA">
						<span>상담 신청하기</span>
					</button>
					<!-- modal 띄우기용 script 에서 .trigger click사용 -->
					<button type="button" class="ui-btn btn-action primary" data-bs-toggle="modal" data-bs-target="#FI0101P02Modal" style="display:none;" id="ToAlertModal">
						<span>상담 신청하기</span>
					</button>
					
					
				</div>
			</div>
		</div>
	</div>
	<!-- // 인터넷 상품 상담 신청하기 modal basic -->
	
	
	<!--
		[모달 가이드]
		모달 기본 : modal
		모달 유형 : modal-full / modal-basic / modal-alert / modal-confirm / modal-select
	-->
	<!-- Modal Alert -->
	<div class="modal modal-alert fade" id="FI0101P02Modal" tabindex="-1" role="alertdialog" data-bs-backdrop="static" aria-labelledby="FI0101P02ModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h3 class="modal-title blind" id="FI0101P02ModalLabel">Alert Message</h3>
				</div>
				<div class="modal-body">
					<section class="msg-sec">
						<h4 class="sec-tit">상담을 신청했어요.</h4>
						<p class="sec-txt">감사합니다. 고객님. <br>입력하신 번호로 상담 전화를 드릴게요.</p>
					</section>
				</div>
				<div class="modal-footer">
					<button type="button" class="ui-btn btn-modal primary" data-bs-dismiss="modal">
						<span>확인</span>
					</button>
				</div>
			</div>
		</div>
	</div>
	<!-- // Modal Alert -->	
	
</html>
