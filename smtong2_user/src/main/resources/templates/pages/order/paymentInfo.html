 <script>
	
	$( document ).ready(function() {
		$("#settleMethod").val("02");
		$("#payCustNm01").val($("#orderNm").val());
		$("#payCustNm02").val($("#orderNm").val());
		
		var companyId = $("#companyId").val();
		if(companyId =="22") {
			getCodeList('card_co_cd_shake');	
		} else {
			getCodeList('card_co_cd');
		}
		getCodeList('bank_co_cd');
		
	});
	
	function tabHandler(targetId, element) {
		document.querySelectorAll("[id$='-pane']").forEach(el => el.classList.remove("active"));

		const targetElement = document.getElementById(targetId);
		if (targetElement) {
			targetElement.classList.add("active");
		}

		// 라디오 버튼 체크 여부 확인 (선택 사항)
		if (element) {
			element.checked = true;
		}
		
		if(targetId =="FQU0111-01-pane") {
			$("#settleMethod").val("02"); // 카드
		} else {
			$("#settleMethod").val("01");
		}
		
	};
	
	
	
	// 카드 선택
	function setSelectValuCard(cardCd,element) {
		$("#cardCd").val(cardCd);
		
		$('#selCardList li').removeClass('is-selected');
	    $(element).addClass('is-selected');
	    var cardnm = $(element).html();
	    
		$('#spSelCard').html(cardnm);
		
	}
	
	
	function setSelectValuBank(bkCd,element) {
		$("#bankCd").val(bkCd);
		
		
		$('#selBankList li').removeClass('is-selected');
	    $(element).addClass('is-selected');
	    var banknm = element.querySelector('.name').textContent;
	    
		$('#spSelBank').html(banknm);
	}
	
	
	function chkInputValid() {
		$('#btnNext').attr('disabled', 'disabled');
		var paySp = $("#settleMethod").val();
		if(paySp =="02") {
			
			var custnameLength = $('#payCustNm01').val().length;
			var payCardMonLength = $('#payCardMon').val().length;
			var payCardYearLength = $('#payCardYear').val().length;
			var payCardNumLength = $('#payCardNum').val().length;
			
			if(custnameLength < 2) {
				return;
			}
			
			if(payCardNumLength < 15) {
				return;
			}
			
			if(payCardMonLength != 2) {
				return;
			}
			
			if(payCardYearLength != 4) {
				return;
			}
			
			if($("#cardCd").val() =="") {
				return;
			}
			
			
		} else {
			
			var custnameLength = $('#payCustNm02').val().length;
			var payBankNumLength = $('#payBankNum').val().length;

			if(custnameLength < 2) {
				return;
			}
			
			if(payBankNumLength <8) {
				return;
			}
			
			if($("#bankCd").val() =="") {
				return;
			}
			
		}
		
		
		$('#btnNext').removeAttr("disabled");		
		
	}
	
	// 납부정보 체크
	function chkPayInfo() {
		var paySp = $("#settleMethod").val();
		if(paySp =="02") {
			$("#ownerNm").val($('#payCustNm01').val());
			$("#cardNum").val($('#payCardNum').val());
			$("#cardValidDt").val($('#payCardYear').val()+""+$('#payCardMon').val());
			moveNextOrder('/order/selBillMethod');
		} else {
			$("#ownerNm").val($('#payCustNm02').val());
			$("#bankAcctNo").val($('#payBankNum').val());
			if($("#bankCd").val() == "BK16") {
				//축협 중앙회는 예금주 조회 코드가 없음
				moveNextOrder('/order/selBillMethod');
			} else {
				callAccCert();	
			}
			
		}
		
		
	}
	
	
	function callAccCert() {
		$("#cmmLoadingBar").show();
		var params = {
				bankCd : $("#bankCd").val(),
				bankNum : $("#bankAcctNo").val() 
		}
		
		$.ajax({
			   url : '/order/bankNumCert',
		       type : 'POST',
		       dataType : "json",
		       contentType:"application/json",
			   data : JSON.stringify(params),
			   beforeSend: function(xhr){
			       xhr.setRequestHeader(header,token);
			    },
				success: function (data) {
					$("#cmmLoadingBar").hide();
					var resbody= data.data.resbody;
					if(resbody.RSLT_CD == "000") {
						var accOwnerNm = resbody.RESP_DATA[0].ACCT_NM;
						if(accOwnerNm ==$('#payCustNm02').val()) {
							moveNextOrder('/order/selBillMethod');
						} else {
							alertModalShow("본인명의 계좌만 등록 가능합니다.");	
						}
					} else {
						alertModalShow(data.data.resbody.RSLT_MSG);
					}
					
			    },
				error : function(request, status, error){
					alertModalShow("계좌 인증 요청이 실패 하였습니다. 다시 시도 바랍니다.");
					$("#cmmLoadingBar").hide();
		        },
		        complete:function(){
		        	$("#cmmLoadingBar").hide();
		        }
			});
		
	}
	
	
	
	function getCodeList(scode_group) {
		
		var params = {
				codeGroup : scode_group,
				userYn : "Y",
				page : 1,
				recordSize : 99
		}
		
		$.ajax({
			   url : '/cmm/cmmcode/code/list',
		       type : 'POST',
		       dataType : "json",
		       contentType:"application/json",
			   data : JSON.stringify(params),
			   beforeSend: function(xhr){
			       xhr.setRequestHeader(header,token);
			    },
				success: function (data) {
					
					
					if(scode_group.startsWith("card_co_cd")) {
						$('#selCardList').empty();
						$('#cardListTmpl').tmpl(data.data).appendTo('#selCardList');	
					} else {
						$('#selBankList').empty();
						$('#bankListTmpl').tmpl(data.data).appendTo('#selBankList');
					}
					
			    },
				error : function(request, status, error){
					
		        },
		        complete:function(){
		           
		        }
			});
		
	}
	
	
	
	function paymethodSel() {
		$('#btnNext').attr('disabled', 'disabled');
		$('#payBankNum').val("");
		$('#payBankNum').val("");	
		$('#spSelBank').html("선택");
		$("#bankCd").val("");
		
		$("#cardCd").val("");
		$('#spSelCard').html("선택");
		$("#payCardNum").val("");
		$("#payCardMon").val("");
		$("#payCardYear").val("");
		
	}
	
 </script>
