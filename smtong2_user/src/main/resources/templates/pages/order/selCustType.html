<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/order_layout}"
	  layout:fragment="Content"
	  th:with="subPageTitle ='가입방식 선택'">

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
 
 <script>
	
	
	$( document ).ready(function() {
		
	   
	});
	
	
	
	function selCustType(sp) {
		var planid= $("#planId").val();
		if(sp=="1") {
			var FQU0101P01Modal = new bootstrap.Modal(document.getElementById('FQU0101P01Modal'));
			FQU0101P01Modal.show();
		} else {
			windowOpen("/pmb/plan-request/planReq?reqPlanid="+planid);	
		}
	}
	

	
	function getNoticeList() {
		var page = $("#viewpage").val();
		if(page ==null|| page == "") page =1;
  		var pageSize = 10;
  		

		var params = {
			 currentPage : page,
			 countPerPage : pageSize,
			 keyword : "화곡동"
		    }
				  
			$.ajax({
			   url : '/api/roadAdress/getAddrApi',
		       type : 'POST',
		       dataType : "json",
		       contentType:"application/json",
			   data : JSON.stringify(params),
			   beforeSend: function(xhr){
			       xhr.setRequestHeader(header,token);
			    },
				success: function (data) {
					if(page == 1) {
						$('#noticeList').empty();	
					}
					
					if(data.totalCnt ==0) {
						$('#nodataNoticeListTmpl').tmpl(null).appendTo('#noticeList');
					} else {
						$('#noticeListTmpl').tmpl(data.data).appendTo('#noticeList');	
					}
					
					//readMoreBtn
					var tCnt = data.totalCnt;
					if(page * pageSize >= tCnt){
						$('#readMoreBtn').hide();
					}else{
						$('#readMoreBtn').show();
					}
										
			    },
				error : function(request, status, error){
					alertModalShow(error,"");
		        },
		        complete:function(){
		           // $('#loading').addClass('display-none');
		        }
			});
	}
 </script>
</th:block>

<!-- Container -->
<main role="main" class="container">
	<th:block th:include="pages/order/incOrderForm :: orderFormFragment"></th:block>
	<!-- content -->
	<div class="content F-QU-page F-QU01-01-page">
		<!-- 간편개통 섹션 -->
		<section class="simple-open-sec">
			<div class="sec-inner">
				<div class="sec-header">
					<h2 class="sec-tit">회원님 본인이 사용하시나요?</h2>
					<p class="sec-explain">
						요금제 신청은 본인 명의로만 가능해요. <br>
						청소년 또는 외국인이라면, 통신사 홈페이지에서 <br>
						가입할 수 있어요.
					</p>
				</div>
				<div class="sec-body">
					<ul class="survey-list">
						<li class="survey-item">
							<label class="ui-rdo survey-rdo">
								<input type="radio" name="frmSurvey" onclick="selCustType('1');"/>
								<span class="rdo"><span>일반 (만 19세 이상)</span></span>
							</label>
						</li>
						<li class="survey-item">
							<label class="ui-rdo survey-rdo">
								<input type="radio" name="frmSurvey" onclick="selCustType('2');"/>
								<span class="rdo"><span>일반 (만 19세 미만)</span></span>
							</label>
						</li>
						<li class="survey-item">
							<label class="ui-rdo survey-rdo">
								<input type="radio" name="frmSurvey" onclick="selCustType('3');"/>
								<span class="rdo"><span>외국인</span></span>
							</label>
						</li>
					</ul>
				</div>
			</div>
		</section>
		<!-- // 간편개통 섹션 -->
	</div>
	<!-- // content -->
	
	<!--
		[모달 가이드]
		모달 효과 : fade (공통)
		모달 기본 : modal
		모달 유형 : modal-full / modal-basic / modal-alert / modal-confirm / modal-select
		화면 이름 : 화면아이디-page (modal-select 제외)
		// 1차 수정 : fade-pc 사용안함, fade 공통으로 사용
	-->
	<!-- modal default -->
	<div class="modal modal-basic fade " id="FQU0101P01Modal" tabindex="-1" role="dialog" aria-labelledby="FQU0101P01ModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content F-QU01-01-P01-page">
				<div class="modal-header">
					<h3 class="modal-title" id="FQU0101P01ModalLabel">개통에 필요한 준비물을 <br>알려드릴게요.</h3>
					<button type="button" class="ui-btn btn-close" data-bs-dismiss="modal" aria-label="Close">
						<i class="ui-icn icn-32-close-bk" aria-label="닫기"></i>
					</button>

				</div>
				<div class="modal-body">
					<!-- 상담신청 섹션 -->
					<section class="ready-steps-sec">
						<div class="sec-inner">
							<ol class="ready-steps">
								<li>
									<em class="num">1</em>
									<div class="con">
										<p class="tit"><strong>주민등록증 또는 운전면허증</strong></p>
										<p class="txt">본인 확인에 필요해요.</p>
									</div>
								</li>
								<li>
									<em class="num">2</em>
									<div class="con">
										<p class="tit"><strong>결제카드 또는 계좌번호</strong></p>
										<p class="txt">요금제 납부 수단 등록에 필요해요.</p>
									</div>
								</li>
							</ol>
						</div>
					</section>
					<!-- // 상담신청 섹션 -->
				</div>
				<div class="modal-footer">
					<button type="button" class="ui-btn btn-action primary" onclick="moveNextOrder('/order/selEntrType');">
						<span>준비됐어요</span>
					</button>
				</div>
			</div>
		</div>
	</div>
	<!-- // modal default -->
	
</main>

	
</html>
