<!DOCTYPE html>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layout/order_layout}"
  layout:fragment="Content"
  th:with="subPageTitle ='약관동의'"
>
  <!-- index.html 고유 CSS 추가 -->
  <th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
  </th:block>
  <!-- index.html 고유 스크립트 추가 -->
  <th:block layout:fragment="script">
    <script>
      $(document).ready(function () {});

      function kakaoCert() {
        $("#identityMethod").val("S");
        $("#simpleCertSp").val("KAKAO");
        kakaoCertInit();
      }

      function cardCert() {
        $("#identityMethod").val("C");
        window.open("/cardcert/cardcert_popup", "auth_popup", "width=430,height=712,scrollbar=yes");
      }
      function cardCertComp(res) {
        if (res == "Y") {
          $("#custCertYn").val("Y");
          moveNextOrder("/order/selUsimEntr");
        }
      }

      function kakaoCertInit() {
        var params = {};

        $.ajax({
          url: "/order/gettoken",
          type: "POST",
          dataType: "json",
          contentType: "application/json",
          data: JSON.stringify(params),
          beforeSend: function (xhr) {
            xhr.setRequestHeader(header, token);
          },
          success: function (data) {
            if (data.code == "200" && data.data.resCode == "200") {
              kakaoCertReq();
            }
          },
          error: function (request, status, error) {
            alertModalShow(error, "");
          },
          complete: function () {
            // $('#loading').addClass('display-none');
          },
        });
      }

      function kakaoCertReq() {
        var params = {
          custnm: $("#orderNm").val(),
          custhid: $("#userSsn").val(),
          custphoneNum: $("#orderPhone").val(),
        };

        $.ajax({
          url: "/order/kakaoCert",
          type: "POST",
          dataType: "json",
          contentType: "application/json",
          data: JSON.stringify(params),
          beforeSend: function (xhr) {
            xhr.setRequestHeader(header, token);
          },
          success: function (data) {
            if (data.data.resultBody != null) {
              var resultStatus = data.data.resultStatus;
              var txId = data.data.resultBody.txId;
              if (resultStatus == "200") {
                $("#custCertTxid").val(txId);
                moveNextOrder("/order/kakaoCertConfirm");
              } else {
                const resultMsg = data.data.resultMsg;
                var jsonString = resultMsg.match(/\"{.*}\"/)[0];
                jsonString = jsonString.slice(1, -1);

                var parsedData = JSON.parse(jsonString);
                var errCode = parsedData.rspCode;
                if (errCode == "E2002") {
                  alertModalShow("입력하신 가입자 정보를 다시 확인해 주세요.", "", moveReInput);
                } else {
                  alertModalShow("인증 요청이 실패 하였습니다. 다시 시도 바랍니다.");
                }
              }
            } else {
              alertModalShow("인증 요청이 실패 하였습니다. 다시 시도 바랍니다.");
            }
          },
          error: function (request, status, error) {
            alertModalShow("인증 요청이 실패 하였습니다. 다시 시도 바랍니다.");
          },
          complete: function () {
            // $('#loading').addClass('display-none');
          },
        });
      }

      function moveReInput() {
        moveNextOrder("/order/reInputCustInfo");
      }
    </script>
  </th:block>

  <!-- Container -->
  <main role="main" class="container">
    <th:block th:include="pages/order/incOrderForm :: orderFormFragment"></th:block>

    <!-- content -->
    <div class="content F-QU-page F-QU01-04-page">
      <!-- 간편개통 섹션 -->
      <section class="simple-open-sec">
        <div class="sec-inner">
          <div class="sec-header">
            <h2 class="sec-tit">안전한 신청을 위해 <br />본인인증을 진행해주세요.</h2>
          </div>
          <div class="sec-body">
            <ul class="survey-list">
              <li class="survey-item">
                <label class="ui-rdo survey-rdo">
                  <input type="radio" name="frmSurvey" onclick="kakaoCert();" />
                  <span class="rdo type-icn"
                    ><span><i class="ui-icn icn-50-cert-kakao"></i>카카오</span></span
                  >
                </label>
              </li>
              <li class="survey-item">
                <label class="ui-rdo survey-rdo">
                  <input type="radio" name="frmSurvey" onclick="cardCert();" />
                  <span class="rdo type-icn"
                    ><span><i class="ui-icn icn-50-cert-card"></i>신용카드</span></span
                  >
                </label>
              </li>
            </ul>
          </div>
        </div>
      </section>
      <!-- // 간편개통 섹션 -->
    </div>
    <!-- // content -->
  </main>
</html>
