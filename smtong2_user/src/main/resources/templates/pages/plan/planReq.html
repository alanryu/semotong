<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:fragment="Content">

<head>

	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="format-detection" content="telephone=no" />
	<meta name="viewport"
		content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
	<meta name="keywords" content="세모통" />
	<meta name="description" content="세모통" />
	<meta id="_csrf" name="_csrf" th:content="${_csrf.token}"/>
	<meta id="_csrf_header" name="_csrf_header" th:content="${_csrf.headerName}"/>
	<title>요금제 신청 | 세모통</title>

	<!-- index.html 고유 CSS 추가 -->
	<link rel="stylesheet" type="text/css" th:href="@{/css/semotong.css}" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
	
	<script th:src="@{/js/libs/jquery.min.js}"></script>
	<script th:src="@{/js/libs/librurys.min.js}"></script>
	<script th:src="@{/js/libs/jquery.tmpl.min.js}"></script>
	<script th:src="@{/js/ui/ui.common.js}"></script>
	<script th:src="@{/js/libs/experienced.js}"></script>
	<script th:src="@{/js/libs/unexperienced.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
	
	<!-- 페이지 스크립트 영역 -->
	<script type="text/javascript">
		document.addEventListener("DOMContentLoaded", function() {
			
			var isLogin ="[[${session.isLoginYn}]]";
			
			//1. 사이트 이동 표시 모달 팝업
			if(isLogin =="Y") {
				var planReqSiteMoveModal = new bootstrap.Modal(document.getElementById('planReqSiteMoveModal'));
				planReqSiteMoveModal.show();
				goReqPlan();	
			} else {
				alertModalShow("요금제 신청을 위해 로그인을 해주세요.", "",goLogin());
				
			}
			
		});
		
		
		
		function goReqPlan() {
			var ReqSiteUrlSMT = $("#urlSmt").val();
			var ReqSiteUrl = $("#linkUrl").val();
			var newNumReqUrl = $('#newNumReqUrl').val();
			var numMoveReqUrl = $('#numMoveReqUrl').val();
			var recomSalesId = $('#recomSalesId').val();
			
			var linkUrlPC = $("#linkUrlPC").val();
			var linkUrlMO = $("#linkUrlMO").val();
			
			
			
			var moveUrl = "";
			var reqSp = "L";
			
			if ( newNumReqUrl != '' && numMoveReqUrl != '' ) {
				// 신규 / 번호이동 용 url 이 있는 경우
				var type = $('#type').val();
				
				if ( type == 'N' ) {
					moveUrl = newNumReqUrl;
				} else {
					moveUrl = numMoveReqUrl;
				}
				
			} else {
				// pc 모바일 이동 url  이 있는 경우				
				if ( linkUrlPC != '' && linkUrlMO != '' ) {
					moveUrl = linkUrlPC;
					const mediaQuery = window.matchMedia('(min-width: 768px)');
					if (mediaQuery.matches) {
					    // 화면 너비가 768px 이상일 때 실행
						moveUrl = linkUrlPC;
					} else {
					    // 화면 너비가 768px 미만일 때 실행
						moveUrl = linkUrlMO;
					}
					
				} else {
					// 공통 URL 로 설정된 경우	
					if(ReqSiteUrlSMT =="") {
						// 공통 URL 대체 URL 이 없는 경우
						moveUrl = ReqSiteUrl;	
					} else {
						// 공통 URL 대체 URL 이 있는 경우
						moveUrl = ReqSiteUrlSMT;
					}	
				}
				
			}
			if(recomSalesId != "N") {
				reqSp = "S";
			} else {
				recomSalesId = null;
			}
			
			 //2. 신청관리 테이블 저장
			var params = {
				reqProd :  "[[${reqPlanid}]]",
				reqSp : reqSp,
				salePlanId : recomSalesId
		    }
		
			$.ajax({
			   url : '/pmb/plan-request/create',
		       type : 'POST',
		       dataType : "json",
		       contentType:"application/json",
			   data : JSON.stringify(params),
			   beforeSend: function(xhr){
			       xhr.setRequestHeader(header,token);
			    },
				success: function (data) {
					
					setTimeout(() => {
						window.location.href=moveUrl;	
					}, 1000); 
					
			    },
				error : function(request, status, error){
					alertModalShow(error,"");
		        },
		        complete:function(){
		           // $('#loading').addClass('display-none');
		        }
			}); 
			
		}

	</script>
</head>
<body>
<input type="hidden" th:value="${result.linkUrl}" id="linkUrl">
<input type="hidden" th:value="${result.urlSmt}" id="urlSmt">
<input type="hidden" th:value="${result.newNumReqUrl}" id="newNumReqUrl">
<input type="hidden" th:value="${result.numMoveReqUrl}" id="numMoveReqUrl">
<input type="hidden" th:value="${type}" id="type">
<input type="hidden" th:value="${recomSalesId}" id="recomSalesId">

<input type="hidden" th:value="${result.pcUrl}" id="linkUrlPC">
<input type="hidden" th:value="${result.moUrl}" id="linkUrlMO">

<!--
	[모달 가이드]
	모달 기본 : modal
	모달 유형 : modal-full / modal-basic / modal-alert / modal-confirm / modal-select
	화면 이름 : 화면아이디-page (modal-select 제외)
-->
<!-- modal default -->
<div class="modal modal-alert fade" id="planReqSiteMoveModal" tabindex="-1" role="alertdialog" data-bs-backdrop="static" aria-labelledby="planReqSiteMoveModalLabel" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content F-P03-01-page">
			<div class="modal-header">
				<h3 class="modal-title blind" id="planReqSiteMoveModalLabel">페이지 이동중</h3>
			</div>
			<div class="modal-body">
				<!-- 컨텐츠 섹션 -->
				<section class="msg-sec">
					<h4 class="sec-tit">[[${result.hostNm}]] 공식 페이지로<br>이동중이에요.</h4>
					<p class="sec-txt">조금만 기다려주세요!</p>
				</section>
				<!-- // 컨텐츠 섹션 -->

				<!-- 페이지 이동중 섹션 -->
				<section class="page-moving-sec">
					<p th:text="${result.planName}"></p>
					<div class="page-moving">
						<div class="brand">
							<img src="/images/common/img-logo-header-bk.svg"  class="logo-image">
						</div>
						<div class="split">
							<i class="ui-icn icn-28-moving" aria-label="페이지 이동중"></i>
						</div>
						<div class="brand">
							<img th:src="@{${compInfo?.logoImg}}"  class="logo-image">
						</div>
					</div>
				</section>
				<!-- // 페이지 이동중 섹션 -->
			</div>
		</div>
	</div>
</div>
<!-- // modal default -->
</body>
</html>
