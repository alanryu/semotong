<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="subPageTitle ='자주묻는 질문', layoutFooterYn='Y', menuId='01'">
	  
  <!-- index.html 고유 CSS 추가 -->
  <th:block layout:fragment="css">
      <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
  </th:block>
  <!-- index.html 고유 스크립트 추가 -->
  <th:block layout:fragment="script">
  <!--    <script th:src="@{/js/page/home.js}"></script>-->
	  <script>
	
		$( document ).ready(function() {
			$(document).on('click', '.ui-btn.btn-sub.primary.xl', function(){
				// navigateTo("/csm/onetoone/onetoone");
				window.location = 'https://pf.kakao.com/_EwxoVn';
			});
			
			selFaqCate("","");
		});
		
		
		function selFaqCate(_this){
			var _val ="";
			var searchKewword = $("#searchKewword").val();
			if(_this !=null) {
				_val = $(_this).val();
				
				$("#selCateVal").val(_val);
				$(_this).parents().find('button').removeClass("is-selected");
				$(_this).addClass("is-selected");
			} else {
				_val =  $("#selCateVal").val();
			}
			
			getFaqList(_val,searchKewword);
		}
		
		function OnKeyEnter() {
			if (window.event.keyCode == 13) {
				selFaqCate();
			}
		}
		
		
	  </script>
  </th:block>

	  
<!-- Container -->
		<main role="main" class="container">
			<input type="hidden" id="selCateVal">
			<!-- content -->
			<div class="content">
				<div class="ui-tab tab-style1">
					<ul class="tab-list" role="tablist">
<!-- 						<li class="tab-item" role="presentation">
							<button class="tab-link" id="tab-11" data-bs-toggle="tab" data-bs-target="#tab-11-pane" type="button" role="tab" aria-controls="tab-11-pane" aria-selected="false" onclick="navigateTo('/csm/baekseo/mvnoInfo');">세모통이란?</button>
						</li> -->
						<li class="tab-item" role="presentation">
							<button class="tab-link" id="tab-12" data-bs-toggle="tab" data-bs-target="#tab-12-pane" type="button" role="tab" aria-controls="tab-12-pane" aria-selected="false" onclick="navigateTo('/csm/baekseo/baekseoList');">세모통 백서</button>
						</li>
						<li class="tab-item" role="presentation">
							<button class="tab-link active" id="tab-13" data-bs-toggle="tab" data-bs-target="#tab-13-pane" type="button" role="tab" aria-controls="tab-13-pane" aria-selected="true">자주묻는 질문</button>
						</li>
					</ul>
				</div>
				<div class="tab-content">
					<!-- 자주묻는 질문 탭 -->
					<div class="F-G03-01-page tab-pane fade show active" id="tab-13-pane" role="tabpanel" aria-labelledby="tab-13" tabindex="0">
						<!-- 자주묻는 질문 섹션 -->
						<section class="faq-sec">
							<div class="sec-inner">
								<!-- 검색 -->
								<div class="faq-srch">
									<div class="ui-inp">
										<input type="text" id="searchKewword" value="" placeholder="검색어를 입력해 주세요." class="inp" onkeyup="OnKeyEnter()"/>
										<div class="on-right">
											<button type="button" class="ui-btn btn-srch" th:onclick="|selFaqCate();|">
												<i class="ui-icn icn-20-srch-bk" aria-label="검색"></i>
											</button>
										</div>
									</div>
								</div>
								<!-- // 검색 -->

								<!-- 분류 스와이퍼 -->
								<div class="swiper keyword-swiper">
									<div class="swiper-wrapper">
										<div class="swiper-slide">
											<!-- 선택됨:  is-selected 클래스, aria-selected="true" -->
											<button type="button" class="keyword-btn is-selected" name="btnFaqCate" aria-selected="true" onclick="selFaqCate(this);" value=""><span>전체</span></button>
										</div>
										<div class="swiper-slide" th:each="list : ${cateList}">
											<button type="button" class="keyword-btn" aria-selected="false"  name="btnFaqCate" onclick="selFaqCate(this);" th:value="${list.code}"><span th:text="${list.codeName}"></span></button>
										</div>
									</div>
								</div>
								<!-- // 분류 스와이퍼 -->

								<!-- 자주묻는 질문 아코디언 -->
								<div class="faq-accordion-wrap" >
									<div class="faq-accordion" id="faqAccordion">
										
									</div>
								</div>
								<!-- // 자주묻는 질문 아코디언 -->
							</div>
						</section>
						<!-- // 자주묻는 질문 섹션 -->
					</div>
					<!-- // 자주묻는 질문 탭 -->
				</div>
			</div>
			<!-- // content -->
		</main>
		<!-- // Container -->
