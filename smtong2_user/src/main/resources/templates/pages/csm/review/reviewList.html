<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="subPageTitle ='', layoutSubTitleYN='N'">

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
<script>
		document.addEventListener("DOMContentLoaded", function() {
			// 모달 바로 볼 수 있도록 호출
			var FM0402P01Modal = new bootstrap.Modal(document.getElementById('FM0402P01Modal'));
			FM0402P01Modal.show();
		});
</script>

</th:block>

	<!--
		[모달 가이드]
		모달 기본 : modal
		모달 유형 : modal-full / modal-basic / modal-alert / modal-confirm / modal-select
		화면 이름 : 화면아이디-page (modal-select 제외)
	-->
	<!-- modal default -->
	<div class="modal modal-full fade-pc" id="FM0402P01Modal" tabindex="-1" role="dialog" aria-labelledby="FM0402P01ModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content F-M04-02-P01-page">
				<div class="modal-header">
					<h3 class="modal-title blind" id="FM0402P01ModalLabel">후기</h3>
					<button type="button" class="ui-btn btn-close" data-bs-dismiss="modal" aria-label="Close">
						<i class="ui-icn icn-32-close-bk" aria-label="닫기"></i>
					</button>
				</div>
				<div class="modal-body">
					<!-- 후기 소개 섹션 -->
					<section class="review-intro-sec">
						<div class="sec-inner">
							<div class="intro-img">
								<i class="ui-icn icn-62-motong" aria-hidden="true"></i>
							</div>
							<div class="intro-con">
								<p>세모통을 사용하시는<br>고객님의 소중한 후기예요.</p>
							</div>
						</div>
					</section>
					<!-- // 후기 소개 섹션 -->

					<!-- 리뷰 섹션 -->
					<section class="review-sec">
						<div class="sec-inner">
							<!-- 이용자 리뷰 평점 -->
							<div class="review-user-sat">
								<ul class="review-list">
									<li class="review-item">
										<div class="review-card">
											<p class="review-name">홍길동</p>
											<p class="review-sat">
												<i class="ui-icn icn-16-star-pr" aria-hidden="true"></i>
												<strong class="val">5.0</strong>
											</p>
											<p class="review-con">
												리뷰 텍스트 영역입니다. 최대 3줄 노출. 초과시 말줄임표 사용. 리뷰 텍스트 영역입니다. 최대 3줄 노출. 초과시 말줄임표 사용. 리뷰 텍스트 영역입니다. 최대 3줄 노출. 초과시 말줄임표 사용. 리뷰 텍스트 영역입니다. 최대 3줄 노출. 초과시 말줄임표 사용
											</p>
										</div>
									</li>
									
								</ul>
								<button type="button" class="ui-btn btn-more-list">
									<i class="ui-icn icn-16-more-list-gr"></i>
									<span>더보기</span>
								</button>
							</div>
							<!-- // 이용자 리뷰 평점 -->
						</div>
					</section>
					<!-- // 리뷰 섹션 -->
				</div>
			</div>
		</div>
	</div>
	<!-- // modal default -->
</html>
