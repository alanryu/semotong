<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세모통 로그인</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/login.css" rel="stylesheet">
</head>
<body>
    <div class="login-container d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card">
            <!-- 로고 영역 -->
            <div class="text-center mb-4">
                <img src="../images/SMT1-3.png" alt="세모통 로고" class="logo-img">
            </div>
            
            <!-- 로그인 타이틀 -->
            <h1 class="text-center mb-4">로그인</h1>
            <h2 class="text-center text-secondary fs-6 mb-4">세모통 계정으로 로그인하세요</h2>

            <!-- 로그인 폼 -->
            <form id="loginForm">
                <div class="floating-input mb-3">
                    <input type="text" 
                           class="form-control" 
                           id="userId"
                           placeholder=" "
                           required>
                    <label for="userId">아이디</label>
                </div>
                
                <div class="floating-input mb-4">
                    <input type="password" 
                           class="form-control" 
                           id="userPassword"
                           placeholder=" "
                           required>
                    <label for="userPassword">비밀번호</label>
                </div>
                
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" 
                               type="checkbox" 
                               id="saveId"
                               style="position:relative; top:2px;">
                        <label class="form-check-label" for="saveId">
                            로그인 상태 유지
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-4" onclick="showAlert('아이디와 비밀번호를 입력해 주세요.')">
                    로그인
                </button>
            </form>

            <!-- 도움말 텍스트 -->
            <p class="text-center text-secondary small">
                아이디와 비밀번호를 잊어버리신 경우<br>시스템 관리자에게 문의하세요.
            </p>
        </div>
    </div>


    <!-- 공통 알림 Modal -->
    <div class="modal fade" id="commonAlertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fs-6 fw-bold">안내</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center pb-4" id="commonAlertMessage">
                    <!-- 메시지가 여기에 동적으로 들어갑니다 -->
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-dark px-4" data-bs-dismiss="modal">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
