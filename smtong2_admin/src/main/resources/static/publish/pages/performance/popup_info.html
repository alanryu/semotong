<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>세모통</title>
        <link href="../../css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
        <link href="../../css/design.css" rel="stylesheet">
    </head>
    <body>
      <button type="button" class="btn btn-lg btn-danger px-4 btn-sm" onclick="showConfirm('해당 월의 입점사 실적 데이터가 이미 등록되어 있습니다. <br><span class=\'c_red\'>새로운 파일로 변경하면 이전 데이터로 복구할 수 없습니다.</span> <br>계속 진행 하시겠습니까?', function() { console.log('확인 클릭'); /* 확인 시 실행할 로직 */ }, function() { console.log('취소 클릭'); /* 취소 시 실행할 로직 */ }, '중복 업로드 안내')">중복 업로드 안내</button>




        <!-- Confirm Modal -->
        <div class="modal fade" id="commonConfirmModal" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered modal-md">
              <div class="modal-content">
              <div class="modal-header border-0 pb-0">
                  <h5 class="modal-title fs-6 fw-bold">확인</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body text-center pb-4" id="commonConfirmMessage">
                  <!-- 메시지가 여기에 동적으로 들어갑니다 -->
              </div>
              <div class="modal-footer border-0 pt-0 justify-content-center">
                  <button type="button" class="btn btn-secondary px-4 btn-sm" id="confirmModalCancelBtn">취소</button>
                  <button type="button" class="btn btn-dark px-4 btn-sm" id="confirmModalConfirmBtn">업로드</button>
              </div>
              </div>
          </div>
      </div>
        
        <script src="../../js/bootstrap.bundle.min.js"></script>
        <script src="../../js/script.js"></script>
    </body>
</html>
