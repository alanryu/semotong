<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세모통 로그인</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/login.css" rel="stylesheet">
</head>
<body>
    <div class="login-container d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card">
            <!-- 로고 영역 -->
            <div class="text-center mb-4">
                <img src="../images/SMT1-3.png" alt="세모통 로고" class="logo-img">
            </div>
            
            <!-- 로그인 타이틀 -->
            <h1 class="text-center mb-4">인증번호 입력</h1>
            
            <!-- 안내문구 -->
            <div class="mb-4">
                <p>등록된 휴대폰 번호로 인증번호가 자동 발송됩니다.</p>
                <ul class="instruction-text ps-3">
                    <li class="mb-1">3분 이내 인증번호를 입력해 주세요.</li>
                    <li>1분 이내에 인증문자가 수신되지 않을 경우 재발송 버튼을 눌러 주세요.</li>
                </ul>
            </div>

            <!-- 인증번호 입력 -->
            <div class="mb-4">
            <div class="floating-input mb-4">
                <input type="text" 
                       class="form-control" 
                       id="userPassword"
                       placeholder=" "
                       required>
                <label for="userPassword">인증번호</label>
                <span class="timer">3:00</span>
              </div>
              <div class="text-end">
                  <a href="#" class="resend-btn">재발송</a>
              </div>
          </div>
          
          <!-- 확인 버튼 -->
          <button class="btn btn-dark w-100 mb-3">
              인증 확인
          </button>

          <!-- 도움말 텍스트 -->
          <p class="text-center text-secondary small">
            인증번호가 수신되지 않을 경우 관리자에게 문의해 주세요.
          </p>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
