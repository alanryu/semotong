<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="menuIdGroup ='07',menuId ='0403'">

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
	<script type="text/javascript">

	
		document.addEventListener('DOMContentLoaded', () => {
			var procMsg = "[[${procMsg}]]";
			
			if(procMsg!="" || procMsg !="") {
				if(procMsg == "sucess") {
					showAlert("저장되었습니다.",moveList);

				} else {
					alert(procMsg);
				}
				
			}
			
			
		});
		
		
		function saveData() {
			showConfirm( '저장 하시겠습니까?',
                    () => { 
                    	saveProc(); 
                    },
                    () => { },
                    '일대일 문의관리'
             )
		}
		
		function saveProc() {
			var _status = $("#status").val();
			if(_status == "01") {
				 $("#status").val("02");
			}
			$("#recordForm").submit();
		}
		
		
		function goList(delId) {
			showConfirm( '입력한 내용이 저장되지 않습니다. 목록으로 돌아가시겠습니까?',
                    () => { 
                    	moveList(); 
                    },
                    () => { },
                    '일대일 문의관리'
             )
		}
		
		
		function moveList() {
			window.location.href="/csm/onetoone/list";
		}

	</script>
		
</th:block>

<div class="main-content">
    <div class="container-fluid">
        <div class="location mb-2">
            <small class="text-secondary">
                <i class="fas fa-home me-1"></i>
                <a href="#">홈</a> > <a href="/svc/mainbanner/dealList">서비스관리</a> > <a href="/cms/notice/list">게시판관리</a> > <a href="/csm/onetoone/list">1:1문의</a>
            </small>
        </div>
        <h2 class="page-title fs-4 mb-4">
               1:1 문의 상세
        </h2>

        <!-- 입력 폼 섹션 -->
	        <div class="search-section detail">
	            <!-- 사업자명 -->
	            <div class="form-row full-width">
	                <div class="form-label">
	                    카테고리
	                </div>
	                <div class="form-control-wrap" th:text="${record.categoryNm}"></div>
	            </div>

                 <div class="form-row">
                     <div class="form-label">작성자</div>
                     <div class="form-control-wrap" th:text="${record.createUserName}"></div>
                 </div>
                 <div class="form-row">
                     <div class="form-label">문의일</div>
                     <div class="form-control-wrap" th:text="${#dates.format(record.createDate, 'yyyy-MM-dd HH:mm:ss')}"></div>
                 </div>
                 
                 <div class="form-row full-width">
                     <div class="form-label">제목</div>
                     <div class="form-control-wrap" th:text="${record.inqueryTitle}"></div>
                 </div>
                 <div class="form-row full-width">
                     <div class="form-label">문의내용</div>
                     <div class="form-control-wrap" th:text="${record.inqueryContent}"></div>
                 </div>
            </div>
         	<form id="recordForm" th:object="${record}" method="POST" th:action="@{/csm/onetoone/update}">
			<input type="hidden" th:field="*{id}" >
			<input type="hidden" th:field="*{status}" >
  			<div class="search-section detail"  style="border: 1px solid #5d83e9;">
                 <div class="form-row">
                     <div class="form-label">담당자</div>
                     <div class="form-control-wrap" th:text="${record.responseNm}"></div>
                 </div>
                 <div class="form-row">
                     <div class="form-label">답변날짜</div>
                     <div class="form-control-wrap" th:text="${#dates.format(record.responseDate, 'yyyy-MM-dd HH:mm:ss')}"></div>
                 </div>
                 <div class="form-row full-width">
                     <div class="form-label">답변 내용</div>
                     <div class="form-control-wrap" style="width:100%;">
                     	  <textarea class="form-control" placeholder="답변을 작성해주세요." th:field="*{responseContent}"></textarea>
                     </div>
                 </div>     
            </div>
            </form>
             <div class="search-section detail">
	            <!-- 사업자명 -->
	            <div class="form-row full-width">
	                <div class="form-label">만족도</div>
	                <div class="form-control-wrap" th:if="${record.score ==1}">매우만족</div>
	                <div class="form-control-wrap" th:if="${record.score ==2}">만족</div>
	                <div class="form-control-wrap" th:if="${record.score ==3}">불만족</div>
	                <div class="form-control-wrap" th:if="${record.score ==0}"></div>
	            </div>
                 <div class="form-row full-width">
                     <div class="form-label">고객의견</div>
                     <div class="form-control-wrap" th:text="${record.responseInquery}"></div>
                 </div>
            </div>
            
            
        </div>
        
        <!-- 버튼 영역 -->
        <div class="d-flex justify-content-center gap-2 mt-4">
        
            <button type="button" class="btn btn-lg btn-secondary px-4 btn-sm" onclick="goList();">
                목록
            </button>   
            <button type="button" class="btn btn-lg btn-dark px-4 btn-sm" onclick="saveData();">
                저장
            </button>         
        </div>
    </div>
</div>
