<script type="text/javascript">

document.addEventListener('DOMContentLoaded', function() {
    
    // 목록 이동 버튼 클릭 이벤트 처리
    const moveDownBtn = document.querySelector('.centerMovingButton .btn-outline-secondary:first-child');
    const moveUpBtn = document.querySelector('.centerMovingButton .btn-outline-secondary:last-child');
    
    // 요금제 선택 테이블 (첫 번째 registered-plans 클래스 요소)
    const plansContainers = document.querySelectorAll('.registered-plans');
    
    if (plansContainers.length >= 2) {
        const selectTableContainer = plansContainers[0];
        const targetTableContainer = plansContainers[1];
        
        const selectTable = selectTableContainer.querySelector('table');
        const targetTable = targetTableContainer.querySelector('table tbody');
        
        // 모두 선택 체크박스 기능 추가
        const checkAllBox = document.getElementById('checkall');
        if (checkAllBox) {
            checkAllBox.addEventListener('change', function() {
                const isChecked = this.checked;
                const allCheckboxes = targetTableContainer.querySelectorAll('tbody input[name="chkSelPlan"]');
                
                allCheckboxes.forEach(function(checkbox) {
                    checkbox.checked = isChecked;
                });
            });
            
            // 개별 체크박스 상태에 따라 전체 선택 체크박스 상태 변경
            targetTableContainer.addEventListener('change', function(e) {
                if (e.target.type === 'checkbox' && e.target !== checkAllBox) {
                    const allCheckboxes = targetTableContainer.querySelectorAll('tbody input[name="chkSelPlan"]');
                    const allChecked = Array.from(allCheckboxes).every(checkbox => checkbox.checked);
                    
                    checkAllBox.checked = allChecked;
                    checkAllBox.indeterminate = !allChecked && Array.from(allCheckboxes).some(checkbox => checkbox.checked);
                }
            });
        }
        
        // 모든 요소가 존재하는지 확인
        if (moveDownBtn && moveUpBtn && selectTable && targetTable) {
            
            // 아래로 이동 버튼 (▼) 클릭 시
            moveDownBtn.addEventListener('click', function() {
                
                // 요금제 선택 테이블에서 체크된 행 가져오기
                const selectRows = selectTable.querySelectorAll('tbody tr');
                
                // 현재 등록된 요금제 수 확인
                const currentRegisteredCount = targetTable.querySelectorAll('tr').length;
                
                // 체크된 행 수 확인
                let checkedCount = 0;
                selectRows.forEach(function(row) {
                    const checkbox = row.querySelector('input[type="checkbox"]');
                    if (checkbox && checkbox.checked) {
                        const planName = row.cells[4].innerText;
                        const existingPlans = targetTable.querySelectorAll('tr');
                        let isDuplicate = false;
                        
                        existingPlans.forEach(function(existingRow) {
                            if (existingRow.cells[4].innerText === planName) {
                                isDuplicate = true;
                            }
                        });
                        
                        if (!isDuplicate) {
                            checkedCount++;
                        }
                    }
                });
                
                // 등록 가능한 최대 요금제 수 체크
                const maxPlans = 10;
                if (currentRegisteredCount + checkedCount > maxPlans) {
                    showAlert(`요금제는 최대 ${maxPlans}개까지 등록 가능합니다. 현재 ${currentRegisteredCount}개가 등록되어 있습니다.`);
                    return;
                }
                
                // 체크된 행들을 등록 요금제 테이블로 이동
                selectRows.forEach(function(row) {
                    const selCheckbox = row.querySelector('input[name="chkSelPlan"]');
                    if (selCheckbox && selCheckbox.checked) {
                        
                        // 이미 등록된 요금제인지 확인 (요금제명 기준)
                        const selPlanName = row.cells[4].innerText;
                        const selPlanId = selCheckbox ? selCheckbox.value : ""; // 값 추출
                        
                        
                        const existingPlans = targetTable.querySelectorAll('tr');
                        let isDuplicate = false;
                        
                        existingPlans.forEach(function(existingRow) {
                        	
                        	const existingCheckbox = existingRow.querySelector('input[name="chkSelPlan"]');
                        	const existingValue = existingCheckbox ? existingCheckbox.value : ""; // 값 추출
                        	
                        	 
                            if (existingValue === selPlanId) {
                                isDuplicate = true;
                            }
                        });
                        
                        // 중복이 아닌 경우에만 추가
                        if (!isDuplicate) {
                            console.log('새 항목을 추가합니다:', selPlanName);
                            
                            // 새 행 생성
                            const newRow = document.createElement('tr');
                            
                            // 원본 행의 내용 복사 (최근수정일 제외)
                            for (let i = 0; i < 13; i++) {
                                const newCell = document.createElement('td');
                                newCell.innerHTML = row.cells[i].innerHTML;
                                newRow.appendChild(newCell);
                            }
                            
                            // 라벨 설정 셀 추가
                            const labelCell = document.createElement('td');
                            labelCell.innerHTML = `
                                <div class="d-flex flex-column">
                                    <div class="form-check mb-1 txt-left">
                                        <input class="form-check-input" type="checkbox" id="chk_recommend_${Date.now()}" name="chk_recommend">
                                        <label class="form-check-label" for="chk_recommend_${Date.now()}">세모통추천</label>
                                    </div>
                                    <div class="form-check mb-1 txt-left">
                                        <input class="form-check-input" type="checkbox" id="chk_lowprice_${Date.now()}" name="chk_lowprice">
                                        <label class="form-check-label" for="chk_lowprice_${Date.now()}">최저가 보장</label>
                                    </div>
                                    <div class="form-check txt-left">
                                        <input class="form-check-input" type="checkbox" id="chk_benefits_${Date.now()}" name="chk_benefits">
                                        <label class="form-check-label" for="chk_benefits_${Date.now()}">최다혜택</label>
                                    </div>
                                </div>
                            `;
                            newRow.appendChild(labelCell);
                            
                            // 순서 버튼 추가
                            const orderCell = document.createElement('td');
                            orderCell.innerHTML = `
                                <div class="d-flex justify-content-center">
                                    <button class="btn btn-sm btn-outline-secondary me-1">▲</button>
                                    <button class="btn btn-sm btn-outline-secondary">▼</button>
                                </div>
                            `;
                            newRow.appendChild(orderCell);

                            
                            // 등록 요금제 테이블에 추가
                            targetTable.appendChild(newRow);
                            
                            // 전체 선택 체크박스 상태 업데이트
                            if (checkAllBox) {
                                const allCheckboxes = targetTableContainer.querySelectorAll('tbody input[name="chkSelPlan"]');
                                const allChecked = Array.from(allCheckboxes).every(checkbox => checkbox.checked);
                                
                                checkAllBox.checked = allChecked;
                                checkAllBox.indeterminate = !allChecked && Array.from(allCheckboxes).some(checkbox => checkbox.checked);
                            }
                        } else {
                            console.log('중복된 항목입니다:', selPlanName);
                        }
                    }
                });
            });
            
            // 위로 이동 버튼 (▲) 클릭 시
            moveUpBtn.addEventListener('click', function() {
                
                // 등록 요금제 테이블에서 체크된 행 삭제
                const targetRows = targetTable.querySelectorAll('tr');
                
                targetRows.forEach(function(row) {
                    const checkbox = row.querySelector('input[type="checkbox"]');
                    if (checkbox && checkbox.checked) {
                        // 삭제할 행의 요금제명 가져오기
                        const planName = row.cells[4].innerText;
                        
                        // 요금제 선택 테이블에서 해당 요금제 찾아서 체크박스 해제
                        const selectRows = selectTable.querySelectorAll('tbody tr');
                        selectRows.forEach(function(selectRow) {
                            const selectPlanName = selectRow.cells[4].innerText;
                            if (selectPlanName === planName) {
                                const selectCheckbox = selectRow.querySelector('input[type="checkbox"]');
                                if (selectCheckbox) {
                                    selectCheckbox.checked = false;
                                }
                            }
                        });
                        
                        // 행 삭제
                        row.remove();
                    }
                });
                
                // 모든 행이 삭제된 경우 체크박스 상태 업데이트
                if (checkAllBox) {
                    const remainingCheckboxes = targetTableContainer.querySelectorAll('tbody input[name="chkSelPlan"]');
                    checkAllBox.checked = remainingCheckboxes.length > 0 && Array.from(remainingCheckboxes).every(checkbox => checkbox.checked);
                    checkAllBox.indeterminate = remainingCheckboxes.length > 0 && !checkAllBox.checked && Array.from(remainingCheckboxes).some(checkbox => checkbox.checked);
                }
            });
            
            // 등록 요금제 테이블 내의 순서 버튼 처리 (이벤트 위임)
            targetTableContainer.addEventListener('click', function(e) {
                if (e.target.classList.contains('btn-outline-secondary')) {
                    const button = e.target;
                    const row = button.closest('tr');
                    
                    // 위로 이동 버튼 (▲)
                    if (button.textContent === '▲') {
                        const prevRow = row.previousElementSibling;
                        if (prevRow) {
                            row.parentNode.insertBefore(row, prevRow);
                        }
                    }
                    // 아래로 이동 버튼 (▼)
                    else if (button.textContent === '▼') {
                        const nextRow = row.nextElementSibling;
                        if (nextRow) {
                            row.parentNode.insertBefore(nextRow, row);
                        }
                    }
                }
            });
            
            // 등록 버튼 클릭 이벤트 처리
            const registerBtn = document.getElementById('registerBtn');
            if (registerBtn) {
                registerBtn.addEventListener('click', function() {
                    // 유효성 검사: 등록 요금제 테이블에 행이 1개 이상 있는지 확인
                    const registeredRows = targetTable.querySelectorAll('tr');
                    const registeredCount = registeredRows.length;
                    
                    // 등록 가능한 최대 요금제 수는 10개
                    const maxPlans = 10;
                    
                    if (registeredCount === 0) {
                        // 요금제가 등록되지 않은 경우
                        showAlert('요금제를 등록해주세요.');
                        return;
                    } else if (registeredCount > maxPlans) {
                        // 최대 개수 초과 시 (일반적으로 UI에서 방지하지만 추가 검증)
                        showAlert(`요금제는 최대 ${maxPlans}개까지 등록 가능합니다. 현재 ${registeredCount}개가 선택되었습니다.`);
                        return;
                    }
                    
                    
                    showConfirm( '등록하시겠습니까?',
        					() => { 
        						insUpdProc();
        					},
        					() => { },
        					'챗봇 요금제 관리'
        			 )
                });
            }
        } else {
            console.error('일부 요소를 찾을 수 없습니다:', {
                moveDownBtn: !!moveDownBtn,
                moveUpBtn: !!moveUpBtn,
                selectTable: !!selectTable,
                targetTable: !!targetTable
            });
        }
    } else {
    }
    
    
    
    initSelect("");
    searchPlanReq();
});

function getDataStrConv(val,sp){
	var res = "";
	
	if(sp=="condData") {
		if(val >= 1024) {
			if(val ==10238976) {
				res = "무제한";
			} else {
				
				const result = val / 1024;
				const decimalPart = result % 1;
				
				if (decimalPart === 0) {
					res = Math.floor(result); // 정수 반환
			    } else {
			    	res= result.toFixed(1); // 소수점 한 자리로 표시
			    }
				res = res + "GB";
			}
		} else {
			res = val + "MB";
		}		
	} else if(sp=="condQos") {
		if(val >= 1024) {
			res = (val / 1024) + "MBps";
		} else {
			res = val + "KBps";
		}
	} else if(sp=="condCall") {
		if(val == 9999) {
			res = "무제한";
		} else {
			res = val + "분";
		}
		
	} else if(sp=="condSms") {
		if(val == 9999) {
			res = "무제한";
		} else {
			res = val + "건";
		}
	} else {
		res = val;
	}
	
	
	return res;
}

function insUpdProc() {
	
	
	const rows = document.querySelectorAll('#trReqList tr');

	var subData ="";
	var subQos ="";
	var _mno = "";
	
	
	var alertTxt = '등록되었습니다';
	var paramSearchId = "[[${searchId}]]";
	if ( paramSearchId !="" ) {
		alertTxt = '수정되었습니다.';
	}
	
	
	// 데이터 추출
	const chatbotGroupPlans  = Array.from(rows).map((row, index) => {
	    // 특정 체크박스 값 추출
	    const chkSelPlan = row.querySelector('input[type="checkbox"][name="chkSelPlan"]');
	    const chkRecommend = row.querySelector('input[type="checkbox"][name="chk_recommend"]');
	    const chkLowprice = row.querySelector('input[type="checkbox"][name="chk_lowprice"]');
	    const chkBenefits = row.querySelector('input[type="checkbox"][name="chk_benefits"]');
	    
	    if(subData=="")  subData = row.querySelector('input[type="hidden"][name="txtSupData"]').value;
	    if(subQos=="")  subQos = row.querySelector('input[type="hidden"][name="txtSupQos"]').value;
	    if(_mno=="")  _mno = row.querySelector('input[type="hidden"][name="txtMno"]').value;
	    
	    return {
	    	plan: chkSelPlan ? chkSelPlan.value : null, // id="chkSelPlan" 값
	    	recomYn: chkRecommend ? chkRecommend.checked : false, // name="chk_recommend" 선택 여부
	    	lowPriceYn:  chkLowprice ? chkLowprice.checked : false, // name="chk_lowprice" 선택 여부
	    	maxBenefitYn: chkBenefits ? chkBenefits.checked : false, // name="chk_benefits" 선택 여부
	    	orderSeq : index +1
	    };
	});
	
	
	const chatbotGroupEntity = {
		    id: paramSearchId, // 예제 값
		    mvno: _mno,
		    supData: subData,
		    subQos: subQos,
		    groupMemo:  $("#chatbotGroupMemo").val(),
		    regCnt: chatbotGroupPlans.length,
		    title: $("#chatbotGroupTitle").val()
		};
	
	
	// 최종 JSON 구조
	const finalJson = {
	    chatbotGroupEntity,
	    chatbotGroupPlans
	};
	
	
	console.log(JSON.stringify(finalJson, null, 2));
	

	$.ajax({
	    url: '/svc/chatbotGroup/insupdProc', // 변경된 URL
	    type: 'POST',
	    dataType: 'json', // 기대하는 응답 타입
	    contentType: 'application/json', // 보낼 데이터 타입
	    data: JSON.stringify(finalJson, null, 2), // 데이터 직렬화
	    success: function (response) {
			

			
	    	showAlert(alertTxt,goList);

	    },
	    error: function (request, status, error) {
	        console.error('Error:', error);
	        showAlert('Failed to save plans: ' + error);
	    }
	});
	
	
}

function searchPlanReq() {
	
	var paramSearchId = "[[${searchId}]]"
	
	
	var	params = {
		searchChatbotGroupId : paramSearchId
	}
	
	
	
	$.ajax({
		   url : '/svc/chatbot/planList',
	       type : 'POST',
	       dataType : "json",
	       contentType:"application/json",
		   data : JSON.stringify(params),
			success: function (data) {
				$('#trReqList').empty();
				$('#reqPlanListTmpl').tmpl(data.data).appendTo('#trReqList');
				
	
				
		    },
			error : function(request, status, error){
				showAlert(error);
	        },
	        complete:function(){
	           // $('#loading').addClass('display-none');
	        }
		});
}
	
	
	function btGoList() {
		
		
		showConfirm( '입력한 내용이 저장되지 않습니다. 목록으로 돌아가시겠습니까?',
				() => { 
					goList();
				},
				() => { },
				'챗봇 요금제 관리'
		 )
		 
	}
	
	
	
	
	function setSelectedPlanChk() {
		
		const trReqListCheckboxes = document.querySelectorAll('#trReqList input[name="chkSelPlan"]');
		const searchListCheckboxes = document.querySelectorAll('#searchList input[name="chkSelPlan"]');
		  
		  
		 trReqListCheckboxes.forEach((trCheckbox) => {
			 chkVal = trCheckbox.value;
			 searchListCheckboxes.forEach((searchCheckbox) => {
				 console.log("chkVal>>>>>>>>>>>" + chkVal);
				 
				 slchkVal = searchCheckbox.value;
				 
				 console.log("slchkVal>>>>>>>>>>>" + slchkVal);
				 if(slchkVal==chkVal) {
					 searchCheckbox.checked = true;
				 }
			 });
			 
			 
		 });
	}
</script>
