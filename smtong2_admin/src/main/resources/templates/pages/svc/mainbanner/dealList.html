<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="menuIdGroup ='07',menuId = '0101'">
	  
<th:block layout:fragment="css">
</th:block>

<th:block layout:fragment="script">
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script>
<script type="text/javascript">
	$(document).ready(function(){
		
		searchResult();
		
		/* 체크박스 전체 */
		$('#expAll').on('change', function(){
			if ( $(this).is(':checked') ) {
				$('input[type=checkbox]').each(function(){
					$(this).prop('checked', true);
				});
			} else {
				$('input[type=checkbox]').each(function(){
					$(this).prop('checked', false);
				});
			}
		});
		
		/* 대기/노출/종료 전부 체크시 전체 체크박스 체크, 아닐시 전체 체크박스 해제 */
		$('#expShow, #expCancel, #expEnd').on('change', function(){
			
			var total = $('input[name=status]').length;
			var checked = $('input[name=status]:checked').length; 
			
			if(!$(this).is(':checked')) {
				$('#expAll').prop('checked', false);
			} else {
				if ( total != checked ) $('#expAll').prop('checked', false);
				else $('#expAll').prop('checked', true);
			}
		});
	})
	
	function searchResult() {
		var params = {
				  page : 1
				, recordSize : 10
			}
		
			/* 배너 타입 */
			params.type = '07';
		
			/* 등록일 */
			if ( $('#searchStartDt').val() != null && $('#searchStartDt').val() != '' ) {
				params.searchStartDt = $('#searchStartDt').val();
			}
			if ( $('#searchEndDt').val() != null && $('#searchEndDt').val() != '' ) {
				params.searchEndDt = $('#searchEndDt').val();
			}
			
			/* 상태 */
			if ( !$('#expAll').is(':checked') ) {
				if ( $('#expShow').is(':checked') ) {
					params.isDispStatusBef = '1';	//대기
				}
				
				if ( $('#expCancel').is(':checked') ) {
					params.isDispStatusDsp = '1';	//노출
				}
				
				if ( $('#expEnd').is(':checked') ) {
					params.isDispStatusEnd = '1';	//종료
				}
			}
			
			if ( $.trim($('#keyword').val()) != null && $.trim($('#keyword').val()) != '' ) {
				params.keyword = $('#keyword').val();
			}
			
			$.ajax({
				url 		: '/svc/mainbanner/dealListProc',
				type 		: 'post',
				dataType 	: 'json',
				contentType : 'application/json',
				data 		: JSON.stringify(params),
				async 		: false,
				success 	: function (data) {
					
					if(params.page == 1) {
						$('#list-area').empty();	
					}
					
					if(data.totalCnt == 0) {
						
					} else {
						
						var totalCnt = data.totalCnt;
						$.each(data.data, function(idx, obj){
							obj.rIdx = totalCnt - ((params.page - 1) * params.recordSize + idx);
						});
						$('#dealbannerlist').tmpl(data.data).appendTo('#list-area');	
					}
					
					renderPagination(params.page, data.totalCnt, params.recordSize);
				},
				error 		: function(request, status, error){
					alert(error);
				},
				complete 	: function(){
				}
			});
	}
	
	/* 등록 화면 진입 */
	function goInsert() {
		$(location).attr('href', '/svc/mainbanner/dealInsert');
	}
	
	/* 현재 시간 기준으로 대기/노출/종료 표시 */
	function divisionStr(startDate, endDate, status) {
		var str = '';
		var now = moment();
		var std = moment(startDate);
		var etd = moment(endDate);
		
		if ( etd < now ) {
			str = '종료';
		} else if ( std > now ) {
			str = '대기'
		} else if ( std < now && etd > now ) {
			str = '노출'
		}
		
		return str;
	}
	
	/* date => string */
	function dateToString(date) {
		var str = '';
		if ( date != null ) {
			var temp = moment(date);
			str = temp.format('YYYY.MM.DD HH:mm');
		}
		return str;
	}
	
	/* 삭제 프로세스 */
	function deleteRow(id) {
		
		showConfirm('삭제하시겠습니까?',
				() => { 
					$.ajax({
					   url 		: '/svc/mainbanner/dealDelete',
				       type 	: 'DELETE',
				       async 	: false,
					   data 	: {delId : id},
						success: function (data) {
							searchResult();
					    },
						error : function(request, status, error){
				            alert(error);
				        },
				        complete:function(){
				           // $('#loading').addClass('display-none');
				        }
					});
				},
				() => {},
				''
		)
	}
	
	/* 초기화 */
	function resetSearch() {
		
		//$('.period-button').eq(1).trigger('click');
		periodButtonInit();
		
		$('input[type=checkbox]').each(function(){
			$(this).prop('checked', true);
		});
		
		$('#keyword').val('');
	}
	
</script>

<script id="dealbannerlist" type="text/x-jquery-tmpl">
	<tr>
		<!-- 번호 -->
		<td>${rIdx}</td>
		<!-- 편집 -->
		<td>
			<div class="d-flex gap-2">
            	<button class="action-btn btn-sm" onclick="location.href='/svc/mainbanner/dealUpdate/${id}'">
                	<i class="fas fa-edit me-1"></i>
                    수정
                </button>
                <button class="action-btn btn-sm" onclick="deleteRow('${id}');">
                	<i class="fas fa-trash me-1"></i>
                    삭제
                </button>
            </div>
		</td>
		<!-- 구분 -->
		<td>{{html divisionStr(start_date, end_date)}}</td>
		<!-- 게시기간 -->
		<td>
			{{html dateToString(start_date)}} ~ {{html dateToString(end_date)}}
		</td>
		<!-- 요금제 -->
		<td>
			{{each(idx, obj) list}}
			${obj.plan_name}<br/>
			{{/each}}
		</td>
		<!-- 등록자 -->
		<td>${createNm}</td>
		<!-- 등록일 -->
		<td>{{html getDateStr(create_date)}}</td>
	</tr>
</script>
</th:block>

	    <div class="search-section">

	                    <div class="form-row full-width">
	                        <div class="form-label mb-0">등록일</div>

	                            <div class="d-flex align-items-center gap-2">

	                <!-- 노출여부 -->
	                <div class="form-row full-width mb-4 mt-4">
	                  <div class="form-label mb-0">상태</div>
	                  <div class="form-control-wrap">
	                      <div class="form-check-group">
	                      	  <div class="form-check">
	                              <input class="form-check-input" type="checkbox" id="expAll" checked>
	                              <label class="form-check-label" for="expShow">전체</label>
	                          </div>
	                          <div class="form-check">

	                              <label class="form-check-label" for="expShow">대기</label>

	                <div class="form-row full-width mb-3">

	    <div class="table-section">
