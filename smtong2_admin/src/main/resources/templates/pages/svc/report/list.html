<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="menuIdGroup ='07',menuId ='08'">

<th:block layout:fragment="css">
</th:block>

<th:block layout:fragment="script">
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script>

<script id="reportlistTmpl" type="text/x-jquery-tmpl">
	<tr>
		<!-- 번호 -->
		<td>${rIdx}</td>
		<td>${processSpName}</td>
		<td>${planName}</td>

		<!-- 내용 -->
		<td>
			<a href="/pbm/error-report/goUpdatePage/${id}">{{html truncateText(reportContent,50)}}</a>
		</td>

		<!-- 신고자 -->
		<td>
			<a href="/pbm/error-report/goUpdatePage/${id}">${username}</a>
		</td>


		<td>{{html dateToStringDot(createDate)}}</td>
		<td>{{html truncateText(memo,10)}}</td>
		<td>${managerName}</td>
		<td>{{html dateToStringDot(modifiedDate)}}</td>
	</tr>
</script>
	<script type="text/javascript">
		document.addEventListener('DOMContentLoaded', () => {
			$("#defaultWeek").trigger("click");
			$("#keyword").focus();
			//페이징 기본(필수)
			currentPage = 1;
			searchList();
		});
		
		function changeCombo(){
			currentPage = 1;
			searchList()
		}
		
		function renderPage(page) {
			currentPage = page;
			searchList();
		}
		
		//초기화
		function resetSearch(){
			$("#keyword").val('');
			selState('');
			//$("#defaultWeek").trigger("click");
			periodButtonInit();
			currentPage = 1;
		}
		
		function stayThis() {
			//window.location.href='/csm/review/list';
			$("#keyword").focus();
		}
		
		function viewDetail(sId){
			window.location.href='/pbm/error-report/goUpdatePage/' + sId;
		}
	
		function searchList() {
			
			//페이징 기본(필수)
			var page = currentPage;
			if(page =="" || page == null) page =1;
			
			var _recordSize =  parseInt($("#pageSizse").val());
			//var _recordSize =  10;
			
			var processList = [];
			$('input[name=sProcessSp]:checked').each(function(){
				if($(this).val() != '') {
					processList.push($(this).val());
				}
			});
			console.log(processList);
			
			if( !_isDateForm($("#searchStartDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchStartDt").focus();
				return;
			}
			if( !_isDateForm($("#searchEndDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchEndDt").focus();
				return;
			}
			
			
			var params = {
			 		 searchKeyword			: $("#keyword").val()							// 입력 검색어 
			 		,searchStartDate		: $("#searchStartDt").val()						//BaseSearchDto
			 		,searchEndDate			: $("#searchEndDt").val()						//BaseSearchDto
			 		,searchProcessSp		: processList 
			 		,page					: page
			 		,recordSize 			: _recordSize
			}
			
			$.ajax({
					url : '/pbm/error-report/ajaxList'
					,type : 'POST'
					,dataType : "json"
					,contentType:"application/json"
					,data : JSON.stringify(params)
					,success: function (data) {
						
						$('#totla_count').html("총 "+data.totalCnt+"건");
						
						var items = data.data
						$('#searchList').empty();
						if(data.totalCnt == 0) {
							//
						} else {
							var totalCnt = data.totalCnt;
							$.each(data.data, function(idx, obj){
								obj.rIdx = totalCnt - ((params.page - 1) * params.recordSize + idx);
							});
							$('#reportlistTmpl').tmpl(data.data).appendTo('#searchList');	
						}
						renderPagination(params.page, data.totalCnt, params.recordSize)
					},
					error : function(request, status, error){
						alert(error);
						//showAlert(error, stayThis);
					},
					complete:function(){
						// $('#loading').addClass('display-none');
					}
			});
			
			
		}
		
		//전체 클릭 동작
		function selState(id) {
			if(id=="") {
				$("input[id^='searcState']").prop("checked", false);
				$("#searcState01").prop("checked", true);
			} else {
				$("#searcState01").prop("checked", false);
			}
		}
		
		function downloadExcel() {
			var page 			= 1;
			var pageSize 		= "999";
			
			
			var processList = [];
			$('input[name=sProcessSp]:checked').each(function(){
				if($(this).val() != '') {
					processList.push($(this).val());
				}
			});
			
			if( !_isDateForm($("#searchStartDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchStartDt").focus();
				return;
			}
			if( !_isDateForm($("#searchEndDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchEndDt").focus();
				return;
			}
			
			var params = {
			 		 searchKeyword			: $("#keyword").val()							// 입력 검색어 
			 		,searchStartDate		: $("#searchStartDt").val()						//BaseSearchDto
			 		,searchEndDate			: $("#searchEndDt").val()						//BaseSearchDto
			 		,searchProcessSp		: processList 
			 		,page					: page
			 		,recordSize 			: pageSize
			}
			
			var _url = '/pbm/error-report/exceldown';
			
			downloadExcelProc(params,_url,"ErrorReportList");
			
		}
		
		
		
	</script>
</th:block>

<div class="main-content">
		<div class="container-fluid">
			 <!-- 로케이션 & 제목 영역 추가 -->
			<div class="page-header mb-4">
				<div class="location mb-2">
					<small class="text-secondary">
						<i class="fas fa-home me-1"></i>
						<a href="/">홈</a> > <a href="/pbm/error-report/list">서비스관리</a> > <a href="/pbm/error-report/list">잘못된정보관리</a>
					</small>
				</div>
				<h2 class="page-title fs-4 mb-4">잘못된정보관리</h2>
			</div>
			
			<div class="search-section">
				<!-- 검색어 -->
				<div class="col-12 mb-2">
					<div class="form-row full-width">
						<div class="form-label mb-0">검색어</div>
						<div class="position-relative col-9">
							<i class="fas fa-search position-absolute" style="left: 16px; top: 15.5px; color: #94a3b8;"></i>
							<input type="text" class="form-control ps-5" placeholder="검색어를 입력하세요" id="keyword" name="keyword">
						</div>
					</div>
				</div>
				<div class="row align-items-center mb-3">
					<div class="col-12">
						<div class="d-flex align-items-center gap-3">
							<div class="form-label mb-0">상태</div>
							<div class="radio-group">
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="checkbox" name="sProcessSp" id="searcState01" value="" checked onclick="selState('')">
									<label class="form-check-label" for="searcState01">전체</label>
								</div>
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="checkbox" name="sProcessSp" id="searcState02" value="01" onclick="selState('REQ')">
									<label class="form-check-label" for="searcState02">신고</label>
								</div>
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="checkbox" name="sProcessSp" id="searcState03" value="02" onclick="selState('ING')">
									<label class="form-check-label" for="searcState03">처리중</label>
								</div>
								<div class="form-check form-check-inline">
									<input class="form-check-input" type="checkbox" name="sProcessSp" id="searcState04" value="03" onclick="selState('COM')">
									<label class="form-check-label" for="searcState04">처리완료</label>
								</div>
							</div>
						</div>
					</div>
				</div>
				 
				<div class="row align-items-center mb-2">
					<div class="form-row full-width">
						<div class="d-flex align-items-center gap-3">
							<div class="form-label mb-0">등록일</div>
							<div class="d-flex align-items-center gap-2">
								<input type="date" class="form-control" style="width: 150px" id="searchStartDt">
								<span class="text-secondary">-</span>
								<input type="date" class="form-control" style="width: 150px" id="searchEndDt">
							</div>
							<div class="d-flex gap-2">
								<button class="period-button" value="0">오늘</button>
								<button class="period-button" value="7" id="defaultWeek">1주일</button>
								<button class="period-button" value="30">1개월</button>
								<button class="period-button" value="90">3개월</button>
								<button class="period-button" value="180">6개월</button>
								<button class="period-button" value="365">1년</button>
							</div>
						</div>
					</div>				
				</div>
				
							
				<div class="row">
					<div class="col-12 text-end mt-2">
						<button class="btn btn-light me-2 btn-sm" onclick="resetSearch()">
							<i class="fas fa-redo"></i>
							초기화
						</button>
						<button class="btn btn-primary btn-sm" onclick="searchList();">
							<i class="fas fa-search"></i>
							검색
						</button>
					</div>
				</div>
			</div>

			<div class="table-section">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<div class="d-flex align-items-center gap-3">
						<div class="stats-badge">
							<i class="fas fa-calculator me-1"></i>
							<span id="totla_count">총 450건</span>
						</div>
						<select class="form-select" style="width: 100px" id="pageSizse" onchange="changeCombo()">
							<option value= "10">10개씩</option>
							<option value= "20">20개씩</option>
							<option value= "30">30개씩</option>
							<option value= "40">40개씩</option>
							<option value= "50">50개씩</option>
						</select>
					</div>
					<div class="header-actions">
						<button class="btn btn-light btn-sm">
							<i class="fas fa-download"></i>
							다운로드
						</button>
						
					</div>
				</div>

				<table class="table custom-table">
					<thead>
						<tr>
							<th>번호</th>
							<th>상태</th>
							<th>상품</th>
							<th>내용</th>
							<th>신고자</th>
							<th>작성일시</th>
							<th>내부메모</th>
							<th>담당자</th>
							<th>처리일시</th>
						</tr>
					</thead>
					<tbody id="searchList">
						
					</tbody>
				</table>

				<div class="d-flex justify-content-left mt-4">
					<ul class="pagination">
						
					</ul>
				</div>
			</div>
		</div>
		
	
</DIV>
