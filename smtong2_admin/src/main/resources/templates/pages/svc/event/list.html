<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="menuIdGroup ='07',menuId ='05'">
	  
<th:block layout:fragment="css">
</th:block>

<th:block layout:fragment="script">
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script> 

<script id="eventlistTmpl" type="text/x-jquery-tmpl">
	<tr>
		<!-- 번호 -->
		<td>${rIdx}</td>
		<!-- 편집 -->
		<td>
			<div class="d-flex gap-2">
				<button class="action-btn btn-sm" onclick="location.href='/svc/event/goUpdatePage/${id}'">
					<i class="fas fa-edit me-1"></i>
					수정
				</button>
				<!-- <button class="action-btn btn-sm" onclick="deleteRow('${id}', '${title}')"> -->
				{{if eventCategory == 'TIMEDEAL'}}
				{{else}}
					<button class="action-btn btn-sm" onclick="showConfirm('${title}\n' + '삭제하시겠습니까?', () => {deleteRow('${id}', '${title}');}, () => {deleteRowCancel();}, '')"> 
						<i class="fas fa-trash me-1"></i>
						삭제
					</button>
				{{/if}}
			</div>
		</td>
		<!-- 구분 -->
		<td>${eventCategoryNm}</td>
		<!-- 제목 -->
		<td>${title}</td>
		<!-- 게시 Y/N -->
		<td>
			<div class="form-check form-switch mb-3">
				<input class="form-check-input" type="checkbox" role="switch" value="${useYn}" {{if useYn == 'Y'}}checked="true"{{/if}} onclick="useYnProc('${id}', this, '${eventCategory}')" style="transform: scale(1.5);">
			</div>
		</td>
		<td>{{html dateToStringDash(startDate)}}</td>
		<td onclick="viewParti('${id}')">참여자 보기</td>
		<td>등록자</td>
		<td>{{html dateToStringDot(createDate)}}</td>
	</tr>
</script>
<script type="text/javascript">
	$(document).ready(function(){
		
		$("#keyword").focus();
		//페이징 기본(필수)
		currentPage = 1;
		searchList();
	})
	
	function goInsert(){
		window.location.href='/svc/event/goUpdatePage/0';
	}
	
	
	function renderPage(page) {
		currentPage = page;
		searchList();
	}
	
	function toggleDetailSearch(){
		$("#searchKeywordType")	.val('ALL')		.prop('selected', true);
		$("#periodType")		.val('CREATE')	.prop('selected', true);
		
		$("#keyword").val('');
		
		periodButtonInit();
		
		$("#cateAll").trigger("click");
		$("#useAll").trigger("click");
		
		currentPage = 1;
	}
	
	function searchList() {
		
		//페이징 기본(필수)
		var page = currentPage;
		if(page =="" || page == null) page =1;
		
		//var _recordSize =  parseInt($("#recordSize").val());
		var _recordSize =  10;
		
		
		if( !_isDateForm($("#searchStartDt").val()) ){
			alert("올바른 날짜를 넣어주세요");
			$("#searchStartDt").focus();
			return;
		}
		if( !_isDateForm($("#searchEndDt").val()) ){
			alert("올바른 날짜를 넣어주세요");
			$("#searchEndDt").focus();
			return;
		}
		
		var params = {
		 		searchKeywordType 		: $("#searchKeywordType").val()					// ALL, TIT, CREATER
		 		,searchKeyword			: $("#keyword").val()							// 입력 검색어 
		 		,searchPeriodType		: $("#periodType").val()						// CREATE, START, END,  등록, 시작, 종료 중 무엇으로 조회
		 		,searchStartDate		: $("#searchStartDt").val()						//BaseSearchDto
		 		,searchEndDate			: $("#searchEndDt").val()						//BaseSearchDto
		 		,searchCategory 		: $("input[name='cateType']:checked").val()		//JOIN: 가입, COMBINE: 결합, RECOM: 추천, INVITE : 초대    // code 관리
		 		,searchUseYn 			: $("input[name='useType']:checked").val()		// Y, N
		 		,page					: page
		 		,recordSize 			: _recordSize
		}
		
		$.ajax({
				url : '/svc/event/ajaxList'
				,type : 'POST'
				,dataType : "json"
				,contentType:"application/json"
				,data : JSON.stringify(params)
				,success: function (data) {
					
					var items = data.data
					$('#searchList').empty();
					if(data.totalCnt == 0) {
						//
					} else {
						var totalCnt = data.totalCnt;
						$.each(data.data, function(idx, obj){
							obj.rIdx = totalCnt - ((params.page - 1) * params.recordSize + idx);
						});
						$('#eventlistTmpl').tmpl(data.data).appendTo('#searchList');	
					}
					$('#totla_count').html("총 "+data.totalCnt+"건");
					renderPagination(params.page, data.totalCnt, params.recordSize)
				},
				error : function(request, status, error){
					alert(error);
				},
				complete:function(){
					// $('#loading').addClass('display-none');
				}
		});
	}
	
	function useYnProc(id, obj, category){
		
		if ( category != 'TIMEDEAL' ) {
			var useYn = $(obj).is(':checked') ? 'Y' : 'N';
			//console.log('useYn:' + useYn);
			var params = { id : id, useYn : useYn}
			$.ajax({
				url			: '/svc/event/ajaxUseYn'
				,type 		: 'POST'
				,dataType 	: "json"
				,contentType:"application/json"
				,data 		: JSON.stringify(params)
				,success	: function (data) {
					$(obj).val(useYn);
				}
				,error 	: function(request, status, error){
					alert(error);
				}
				,complete:function(){
				}
			});
		} else {
			$(obj).prop('checked', true);
		}
	}
	
	function deleteRow(id, tit){
		
		//confirm('[' + tit + ']' + '삭제 하시겠습니까?');
		var params = { id : id}
		$.ajax({
			url			: '/svc/event/ajaxDel'
			,type 		: 'POST'
			,dataType 	: "json"
			,contentType:"application/json"
			,data 		: JSON.stringify(params)
			,success	: function (data) {
				console.log(data);
				alert('삭제 되었습니다.');
				searchList();
			}
			,error 	: function(request, status, error){
				alert(error);
			}
			,complete:function(){
			}
		});
		$("#keyword").focus();
	}
	
	function deleteRowCancel(){
		console.log('취소 되었습니다.');
		$("#keyword").focus();
	}
	
	
	function viewParti(id){
		alert("차후 개발 대상" + id);
	}
	
	
	
	

</script>


</th:block>

<div class="main-content">
	
	<div class="container-fluid">
		<!-- 로케이션 & 제목 영역 추가 -->
		<div class="page-header mb-4">
			<div class="location mb-2">
				<small class="text-secondary">
					<i class="fas fa-home me-1"></i>
					<a href="javascript:;">홈</a>
					>
					<a href="javascript:;">서비스 관리</a>
					>
					<a href="/svc/event/list">이벤트관리</a>
				</small>
			</div>
			<h2 class="page-title fs-4 mb-4">
				이벤트관리
			</h2>
		</div>
		
		<!-- 검색 구간 -->
		<div class="search-section">
			<div class="col-12 mb-2">
				<div class="form-row">
					<div class="form-label mb-0">검색조건</div>
					<div class="form-control-wrap flex-grow-1">
						<select class="form-select" id="searchKeywordType">
							<option value="ALL">전체</option>
							<option value="TIT">제목</option>
							<option value="CREATER">등록자</option>
						</select>
					</div>
					<div class="position-relative col-9">
						<i
							class="fas fa-search position-absolute"
							style="left: 16px; top: 15px; color: #94a3b8;"></i>
						<input type="text" class="form-control ps-5" id="keyword" placeholder="검색어를 입력하세요">
					</div>
				</div>
			</div>
			<div class="row align-items-center mb-2">
				<div class="form-row">
					<div class="form-label mb-0">검색기간</div>
					<div class="d-flex align-items-center gap-3">
						<select class="form-select" style="width: 120px" id="periodType">
							<option value="CREATE">등록일자</option>
							<option value="START">시작일자</option>
							<option value="END">종료일자</option>
						</select>
						<div class="d-flex align-items-center gap-2">
							<input type="date" class="form-control" style="width: 150px" id="searchStartDt">
							<span class="text-secondary">-</span>
							<input type="date" class="form-control" style="width: 150px" id="searchEndDt">
						</div>
						<div class="d-flex gap-2">
							<button class="period-button" value="0">오늘</button>
							<button class="period-button" value="7" id="defaultWeek">1주일</button>
							<button class="period-button" value="30">1개월</button>
							<button class="period-button" value="90">3개월</button>
							<button class="period-button" value="180">6개월</button>
							<button class="period-button" value="365">1년</button>
						</div>
					</div>
				</div>
			</div>
			<div class="row align-items-center mb-3">
				<div class="col-12">
					<div class="d-flex align-items-center gap-3">
						<div class="form-label mb-0">게시여부</div>
						<div class="radio-group">
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="cateType" id="cateAll" value="ALL" checked>
								<label class="form-check-label" for="cateAll">전체</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="cateType" id="cateJoin" value="JOIN">
								<label class="form-check-label" for="cateJoin">가입</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="cateType" id="cateCombine" value="COMBINE">
								<label class="form-check-label" for="cateCombine">결합</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="cateType" id="timeDeal" value="TIMEDEAL">
								<label class="form-check-label" for="timeDeal">타임딜</label>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="row align-items-center mb-3">
				<div class="col-12">
					<div class="d-flex align-items-center gap-3">
						<div class="form-label mb-0">게시여부</div>
						<div class="radio-group">
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="useType" id="useAll" value = "" checked>
								<label class="form-check-label" for="useAll">전체</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="useType" id="useY" value = "Y">
								<label class="form-check-label" for="useY">Y</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="useType" id="useN" value = "N">
								<label class="form-check-label" for="useN">N</label>
							</div>
						</div>
					</div>
				</div>
			</div>
			<!-- 검색 구간 -->

			<div class="row">
				<div class="col-12 text-end mt-2">
					
					<button class="btn btn-primary btn-sm" onclick="searchList();">
						<i class="fas fa-search"></i>
						검색
					</button>
					<button class="btn btn-light me-2 btn-sm" onclick="toggleDetailSearch()">
						<i class="fas fa-redo"></i>
						초기화
					</button>
				</div>
			</div>
		</div>
		
		
		
		
		<!-- contents 영역 -->
		<div class="table-section">
			<div class="d-flex justify-content-between align-items-center mb-4">
				<div class="d-flex align-items-center gap-3">
					<div class="stats-badge">
						<i class="fas fa-calculator me-1"></i>
						<span id="totla_count">총 450건</span>
					</div>
				</div>
				
				<div class="header-actions">
					<div class="custom-dropdown">
						<button class="btn btn-primary btn-sm btnDrop" onclick="goInsert()">
							<i class="fas fa-calculator"></i>
							등록
						</button>
					</div>
				</div>
			</div>
			
			<table class="table custom-table">
				<thead>
					<tr>
						<th>번호</th>
						<th>편집</th>
						<th>구분</th>
						<th>제목</th>
						<th>게시여부</th>
						<th>시작일자</th>
						<th>참여자</th>
						<th>등록자</th>
						<th>등록일자</th>
					</tr>
				</thead>
				<tbody id="searchList">
				</tbody>
			</table>
			
			<div class="d-flex justify-content-left mt-4">
				<ul class="pagination">
				</ul>
			</div>
		</div>
	</div>
</div>
