<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="menuIdGroup ='08',menuId ='01'">

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script> 

	<script id="searchlistTmpl" type="text/x-jquery-tmpl">
		<tr>
			<!-- 번호 -->
			<td>${rIdx}</td>
			<td>${orderStateNm}</td>
			<td>{{if entrType =='01'}} 신규가입 {{else}} 번호이동{{/if}}</td>
			<td><a href="/pmb/plan-sales/applyDetail?orderId=${id}">{{html listView('name',orderNm)}}</a> </td>
			<td>{{html listView('phone',orderPhone)}}</td>
			<td>${telecomCd}</td>
			<td>${companyNm}</td>
			<td><a href="/pmb/plan-sales/applyDetail?orderId=${id}">${planNm}</a></td>
			<td>${recomUserAdminId}</td>
			<td>{{if pointPlanYn}} Y {{else}} N{{/if}}</td>
			<td>{{html strDttmToStringDash(orderDttm)}}</td>
			<td>${openCompDttm}</td>
		</tr>
	</script>
 <!-- index.html 고유 스크립트 추가 -->
	
	 <script type="text/javascript">
	 	$(document).ready(function(){
	 		$.data(document, "currentPage", 1);
	 		var authType = "[[${session.loginUser.authType}]]";
	 		searchList();
	 	})
	 	
	 	function listView(sp,val) {
	 		var authType = "[[${session.loginUser.authType}]]";
	 		if(authType =="SALES") {
	 			if(sp =="name") {
	 				val = maskName(val);
	 			}
				if(sp =="phone") {
					val = maskPhoneNumber(val);
	 			}
	 		}
	 		return val;
	 	}
	 	
	 	function renderPage(page) {
			currentPage = $.data(document, "currentPage", page);
			searchList();
		}
	 	
	 	function searchList() {
	 		
			var page = $.data(document, "currentPage");
			if(page =="" || page == null) page =1;
			var _recordSize =  parseInt($("#recordSize").val());
			
			var params = {
				keyword : $("#keyword").val(),
				searchOrderState : getCheckedCompanies("searchOrderState"),
		 		searchStartDt : $("#searchStartDt").val(),
		 		searchEndDt : $("#searchEndDt").val(),
		 		searchBizPlanMngId : $('#id').val(),
		 		page : page,
		 		recordSize : _recordSize
			}
			
			$.ajax({
				url : '/pbm/order/ajaxList'
				,type : 'POST'
				,dataType : "json"
				,contentType:"application/json"
				,data : JSON.stringify(params)
				,success: function (data) {
					
					$('#searchList').empty();
					var totalCnt = data.totalCnt;
					
					if(totalCnt > 0) {
						
						$.each(data.data, function(idx, obj){
							var rIdx = data.totalCnt - ((params.page - 1) * params.recordSize + idx);
							obj.rIdx = rIdx;
						});
						
						$('#searchlistTmpl').tmpl(data.data).appendTo('#searchList');
					}
					$('#totla_count').html("총 "+totalCnt+"건");
					
					renderPagination(page, totalCnt, _recordSize)
				},
				error : function(request, status, error){
					alert(error);
				},
				complete:function(){
					// $('#loading').addClass('display-none');
				}
			});
		}
	 	
		function downloadExcel() {
			var params = {
				keyword : $("#keyword").val(),
				searchOrderState : getCheckedCompanies("searchOrderState"),
		 		searchStartDt : $("#searchStartDt").val(),
		 		searchEndDt : $("#searchEndDt").val(),
		 		searchBizPlanMngId : $('#id').val()
			}
			
			var _url = '/pmb/plan-sales/applyExceldown';
			
			downloadExcelProc(params,_url,"planSalesApplyList");
			
		}
	 </script>
	 
	 function changeCombo(){
		currentPage = 1;
		searchList()
	}
	
</th:block>

<div class="main-content">

		<div class="page-header mb-4">
	        <div class="location mb-2">
	            <small class="text-secondary">
	                <i class="fas fa-home me-1"></i>
	                <a href="javascript:;">홈</a> > <a href="javascript:;">영업관리</a> > <a href="javascript:;">영업상품 관리</a>
	            </small>
	        </div>
	        <h2 class="page-title fs-4 mb-4">
	            영업상품 신청내역

                                    </div>
                                    <div>

                                    </div>
                                </div>
                            </div>
                            <div class="col-md-8">

                                    </div>
                                    <div>

        </div>
        
        <!-- 검색 구간 -->
		<div class="search-section">

			<div class="col-12 mb-2">
				<div class="form-row full-width">
					<div class="form-label mb-0">검색어</div>
					<div class="position-relative col-9">
						<i class="fas fa-search position-absolute" style="left: 16px; top: 15.5px; color: #94a3b8;"></i>
						<input type="text" class="form-control ps-5" placeholder="검색어를 입력하세요" id="keyword" name="keyword">
					</div>
				</div>
			</div>
			 <!-- 상태 구분 -->
             <div class="form-row full-width mb-3">
                 <div class="form-label mb-0">상태 구분</div>
                 <div class="form-control-wrap">
                     <div class="form-check-group">
                         <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderStateALL" value="" checked onclick="selstate('');" >
                             <label class="form-check-label" for="searchOrderStateALL">전체</label>
                         </div>
                         <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState00" value="00" onclick="selstate('00');">
                             <label class="form-check-label" for="searchOrderState00">접수대기</label>
                         </div>
                         <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState01" value="01" onclick="selstate('01');">
                             <label class="form-check-label" for="searchOrderState01">접수</label>
                         </div>
                         <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState02" value="02" onclick="selstate('02');">
                             <label class="form-check-label" for="searchOrderState02">접수완료</label>
                         </div>
                          <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState03" value="03" onclick="selstate('03');">
                             <label class="form-check-label" for="searchOrderState03">배송중</label>
                         </div>
                          <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState04" value="06" onclick="selstate('06');">
                             <label class="form-check-label" for="searchOrderState04">개통완료</label>
                         </div>
                          <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState05" value="99" onclick="selstate('99');">
                             <label class="form-check-label" for="searchOrderState05">개통취소</label>
                         </div>
                         <div class="form-check">
                             <input class="form-check-input" type="radio" name="searchOrderState" id="searchOrderState06" value="98" onclick="selstate('98');">
                             <label class="form-check-label" for="searchOrderState06">개통불가</label>
                         </div>
                     </div>
                 </div>

			<div class="row align-items-center mb-2">

			<!-- 검색 구간 -->

			<div class="row">

		<!-- contents 영역 -->
