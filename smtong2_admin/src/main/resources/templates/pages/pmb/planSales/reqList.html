<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
	<script id="searchListTmpl" type="text/x-jquery-tmpl">
		<tr onclick="viewDetail('${id}');" style="cursor: pointer;">
			<td>${id}</td>
			<td>{{html listView('name',reqNm)}}</td>
			<td>{{html listView('phone',reqPhonNum)}}</td>
			<td>${planMno}</td>
			<td>${planCompanyNm}</td>
			<td>${reqProdNm}</td>
			<td>{{html getDateStr(createDate)}}</td>
		</tr>
	</script>
	<script type="text/javascript">

		function listView(sp,val) {
	 		var authType = "[[${session.loginUser.authType}]]";
	 		if(authType =="SALES") {
	 			if(sp =="name") {
	 				val = maskName(val);
	 			}
				if(sp =="phone") {
					val = "0" + val.split(" ")[1].replaceAll("-","");
					val = maskPhoneNumber(val);
	 			}
	 		} else {
	 			if(sp =="phone") {
					val = "0" + val.split(" ")[1];
	 			}
	 		}
	 		return val;
	 	}


		var authType = "";
		document.addEventListener('DOMContentLoaded', () => {

			authType = "[[${session.loginUser.authType}]]";
			if(authType =="HOST") {
				var authCompany = "[[${session.loginUser.companyCode}]]";
				checkCompanyList(authCompany);
				$("#searchDvCompay").hide();
			}
			searchList();

			const closeBtn = document.querySelector('.gift-select__close');
			const cancelBtn = document.querySelector('.gift-select-close4');
			closeBtn.addEventListener('click', closeModal);
			cancelBtn.addEventListener('click', closeModal);

		});

		function changeCombo(){
			currentPage = 1;
			searchList()
		}


		function checkCompanyList(valueToCheck) {
		    // 모든 체크박스를 선택
		    const checkboxes = document.querySelectorAll('input[type="checkbox"][name="searchCompanyList"]');

		    // 값이 동일한 체크박스를 찾아 체크
		    checkboxes.forEach(checkbox => {
		        if (checkbox.value == valueToCheck) {
		            checkbox.checked = true;
		            checkbox.disabled = false; //
		        } else {
		        	checkbox.checked = false; // 체크 해제
		            checkbox.disabled = true; // 비활성화
		        }
		    });
		}





		function renderPage(page) {
			currentPage = page;
			searchList();
		}


		function searchList() {
			var page = currentPage;
			if(page ==null|| page == "") page =1;
	  		var pageSize = $("#pageSizse").val();
	  		var searchSalePlanId = "[[${entity.id}]]";
			var params = {
				searchType : $("#searchType").val(),
				 keyword : $("#keyword").val(),
				 searchStartDt : $("#searchStartDt").val(),
				 searchEndDt : $("#searchEndDt").val(),
				 searchreqSp:"S",
				 searchCompanyList : getCheckedCompanies("searchCompanyList"),
				 searchMno : getCheckedCompanies("searchMno"),
				 searchSalePlanId : searchSalePlanId,
				 page : page,
				 recordSize : pageSize
				}

				$.ajax({
				   url : '/pmb/plan-request/ajaxlist',
				   type : 'POST',
				   dataType : "json",
				   contentType:"application/json",
				   data : JSON.stringify(params),
				   success: function (data) {
						//if(page == 1) {
							$('#searchList').empty();
						//}


						$('#totla_count').html("총 "+data.totalCnt+"건");
						if(data.totalCnt > 0) {
							$('#searchListTmpl').tmpl(data.data).appendTo('#searchList');
						}

						renderPagination(page,data.totalCnt,pageSize);
					},
					error : function(request, status, error){
						showAlert(error);
					},
					complete:function(){
					   // $('#loading').addClass('display-none');
					}
				});
		}


		function selCompany(id) {

			if(id=="") {
				$("input[id^='searchCompanyList']").prop("checked", false);
				$("#searchCompanyListALL").prop("checked", true);
			} else {
				$("#searchCompanyListALL").prop("checked", false);
			}

		}


		function selMno(id) {

			if(id=="") {
				$("input[id^='searchMno']").prop("checked", false);
				$("#searchMnoAll").prop("checked", true);
			} else {
				$("#searchMnoAll").prop("checked", false);
			}
		}



		function viewDetail(searchId) {

			$.ajax({
			   url : '/pmb/plan-request/detail',
			   type : 'POST',
			   data: { id: searchId }, // 요청 데이터
			   success: function (data) {

				   if(data.code ==200) {
					   var resdata = data.data;

					   var linkUrl = getLinkUrl(resdata.linkUrl,resdata.urlSmt);
					   $("#dvtlinkUrl").html("<a href='"+linkUrl+"' target='_blank'> "+linkUrl+"</a>");

					   $("#dvtreqNm").html(resdata.reqNm);
					   $("#dvtreqPhonNum").html(resdata.reqPhonNum);
					   $("#dvtplanMno").html(resdata.planMno);
					   $("#dvtplanCompanyNm").html(resdata.planCompanyNm);
					   $("#dvtreqProdNm").html(resdata.reqProdNm);
					   $("#dvtnormalPrice").html(getPriceStr(resdata.normalPrice));
					   $("#dvtsalePrice").html(getPriceStr(resdata.salePrice));
					   $("#dvtpromotionPeriod").html(resdata.promotionPeriod);
						const modal = document.getElementById('detailViewModal');
						modal.style.display = 'flex';
				   } else {
					   showAlert(data.message);
				   }


				},
				error : function(request, status, error){
					showAlert(error);
				},
				complete:function(){
				   // $('#loading').addClass('display-none');
				}
			});


		}

		// 모달 닫기 함수
		function closeModal() {
			const modal = document.getElementById('detailViewModal');
			modal.style.display = 'none'; // 모달 숨기기
		}


		function toggleSearchInit(){
			$("#keyword").val('');

			if(authType !="HOST") selCompany("");
			selMno("");

			$('.period-button[value="180"]').trigger("click");
			currentPage = 1;
		}

		//02.03 - sancho
		function downloadExcel() {
			//페이징 기본(필수)
			var page = 1;
			if(page =="" || page == null) page =1;
			//var _recordSize =  parseInt($("#recordSize").val());
			var _recordSize =  999;

			var searchSalePlanId = "[[${entity.id}]]";

			var params = {
							searchType : $("#searchType").val(),
							 keyword : $("#keyword").val(),
							 searchStartDt : $("#searchStartDt").val(),
							 searchEndDt : $("#searchEndDt").val(),
							 searchreqSp:"S",
							 searchCompanyList : getCheckedCompanies("searchCompanyList"),
							 searchMno : getCheckedCompanies("searchMno"),
							 searchSalePlanId : searchSalePlanId,
							 page : page,
							 recordSize : _recordSize
							}



			var _url = '/pmb/plan-request/exceldown';

			downloadExcelProc(params,_url,"PlanRequestList");

		}
	</script>
</th:block>

			<div class="search-section">

				 <!-- 사업자 -->

								  <label class="form-check-label" for="searchCompanyListALL">전체</label>
