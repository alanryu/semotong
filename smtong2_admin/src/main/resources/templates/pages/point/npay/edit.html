<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{common/layout/default_layout}"
	  layout:fragment="Content"
	  th:with="menuIdGroup ='09',menuId ='02'">

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
	<!--	<link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
	<script type="text/javascript">

	
		document.addEventListener('DOMContentLoaded', () => {
			
			//저장 후 메세지
			var procMsg			= "[[${procMsg}]]";
			var procMsgDetail	= "[[${procMsgDetail}]]";
			if(procMsg != "") {
				if(procMsg == "sucess") {
					showAlert("취소되었습니다.",moveList);
				} else {
					//alert(procMsg);
					showAlert(procMsgDetail, moveList);
				}
			}
			
		});
		// Go to List
		function moveList() {
			window.location.href="/point/npay/list";
		}
		// 그래도 갈꺼니?
		function goList() {
			showConfirm( '입력한 내용이 저장되지 않습니다. 목록으로 돌아가시겠습니까?',
					() => { 
						moveList(); 
					},
					() => { },
					'네이버페이 교환관리'
			 )
		}
		
		
		//[등록] 클릭
		function saveData() {
			showConfirm( '저장 하시겠습니까?',
					() => { 
						checkSaveProc();
					},
					() => { },
					'네이버페이 교환관리'
			 )
		}
		function checkSaveProc() {
			
			var abc = $("input[name='npayApiType']:checked").val();
			var memostr = $("#memo").val();
			
			if(abc != "cancel"){
				showAlert("취소를 선택해 주세요.");
				return;
			}else if (!memostr || memostr.trim() === ""){
				showAlert("사유를 입력해 주세요.");
				return;
			}else{
				saveProc();
			}
			
			
		}
		function saveProc() {
			$("#recordForm").submit();
		}
		
		//숫자 입력란 제한 
		function handleOnInput(el, maxlength) {
			if(el.value.length > maxlength)  {
				el.value = el.value.substr(0, maxlength);
			}
		}
		
	</script>
		
</th:block>


		<div class="main-content">
			<div class="container-fluid">
				<!-- 로케이션 & 제목 영역 추가 -->
				<div class="page-header d-flex justify-content-between align-items-start">
					<div>
						<div class="location mb-2">
							<small class="text-secondary">
								<i class="fas fa-home me-1"></i>
								<a href="/">홈</a>
								>
								<a href="/point/npay/list">포인트관리</a>
								>
								<a href="/point/npay/list">네이버페이 교환 상세</a>
							</small>
						</div>
						<h2 class="page-title fs-4 mb-4">
							<div>네이버페이 교환 상세</div>
						</h2>
					</div>
				</div>
				
				<form id="recordForm" th:object="${record}" method="POST" th:action="@{/point/npay/cancelInsert}">
				<input type="hidden" th:field="*{id}" >
				<input type="hidden" th:field="*{userId}" >
				<input type="hidden" th:field="*{phoneNumber}" >
				
				<input type="hidden" th:field="*{pointId}" >
				<input type="hidden" th:field="*{userKey}" >
				<input type="hidden" th:field="*{txNo}" >			<!-- userKey / txNo 		: /v1/npay/point/cancel  	-->
				<input type="hidden" th:field="*{partnerTxNo}" >	<!-- userKey / partnerTxNo 	: /v1/npay/point/net-cancel -->
				
				<div class="search-section detail">
					
					<div class="form-row full-width">
						<div class="form-label">회원명<span class="required">*</span></div>
						<div class="form-control-wrap">
							<input type="text" class="form-control"  th:field="*{username}" readonly>
						</div>
					</div>
					
					<div class="form-row full-width">
						<div class="form-label">카카오ID</div>
						<div class="form-control-wrap">
							<input type="text" class="form-control" th:field="*{kakaoUserId}" readonly>
						</div>
					</div>
					
					<div class="form-row full-width">
						<div class="form-label">전환금액</div>
						<div class="form-control-wrap">
							<input type="text" class="form-control" th:field="*{reqAmount}" readonly>
						</div>
					</div>
					
					<div class="form-row full-width">
						<div class="form-label">전환/취소 일시</div>
						<div class="form-control-wrap">
							<input type="text" class="form-control" th:field="*{createDate}" readonly>
						</div>
					</div>
					
					<div class="form-row full-width mb-3">
						<div class="form-label mb-0">구분<span class="required">*</span>
						</div>
						<div class="form-control-wrap">
							
							<th:block th:if="${record.dayAfter eq 'INNER'}">
							<div class="form-check-group">
								<div class="form-check">
									<input class="form-check-input" type="radio" th:field="*{npayApiType}" value="point" th:checked="${npayApiType eq 'point'}" disabled>
									<label class="form-check-label" for="npayApiType1">전환</label>
								</div>
								<div class="form-check">
									<input class="form-check-input" type="radio" th:field="*{npayApiType}" value="cancel" th:checked="${npayApiType eq 'cancel'}" th:disabled="${record.npayApiType eq 'cancel'} ? 'disabled'">
									<label class="form-check-label" for="npayApiType2">취소</label>
								</div>
							</div>
							</th:block>
							<th:block th:if="${record.dayAfter eq 'OUTTER'}">
								<input type="text" class="form-control" th:if="${record.npayApiType eq 'point'}" value="전환" disabled>
								<input type="text" class="form-control" th:if="${record.npayApiType eq 'cancel'}" value="취소" disabled>
							</th:block>
							<th:block th:if="${record.dayAfter eq 'CANCELED'}">
								이미 취소 되었습니다.
							</th:block>
							
							
						</div>
					</div>
					
					<div class="form-row full-width">
						<div class="form-label">사유<span class="required">*</span></div>
						<div class="form-control-wrap">
							<th:block th:if="${record.dayAfter eq 'INNER'}">
								<textarea th:field="*{memo}" class="form-control" placeholder="" th:disabled="${record.npayApiType eq 'cancel'} ? 'disabled'"></textarea>
							</th:block>
							<th:block th:if="${record.dayAfter eq 'OUTTER'}">
								<textarea th:field="*{memo}" class="form-control" placeholder="" disabled></textarea>
							</th:block>
						</div>
					</div>

					<div class="form-row full-width">
						<div class="form-label">담당자</div>
						<div class="form-control-wrap">
							<input type="text" class="form-control" 		th:field="*{mngName}"  readonly>
						</div>
					</div>
					<div class="form-row full-width">
						<div class="form-label">처리일</div>
						<div class="form-control-wrap">
							<input type="text" class="form-control" 		th:field="*{mngDate}" readonly>
						</div>
					</div>
				</div>
				</form>

				<!-- 버튼 영역 -->
				<div class="d-flex justify-content-center gap-2 mt-4">
					<button type="button" class="btn btn-lg btn-secondary px-4 btn-sm" onclick="goList();">
						닫기
					</button>
					<button type="button" class="btn btn-lg btn-dark px-4 btn-sm" th:if="${record.npayApiType eq 'point'}" onclick="saveData()">
						등록
					</button>
				</div>
			</div>
		</div>
