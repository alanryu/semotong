<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"

	  layout:fragment="Content"

<!-- index.html 고유 CSS 추가 -->
<th:block layout:fragment="css">
	<!--	<link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
	<style>
	.c_blue {
	  color:blue !important;
	}
	</style>
</th:block>
<!-- index.html 고유 스크립트 추가 -->
<th:block layout:fragment="script">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script>
	 <script id="searchListTmpl" type="text/x-jquery-tmpl">
		<tr>
			<td>${rIdx}</td>
			<td><b>${statusName}</b></td>
			<td><b><a href="/point/cash/edit/${id}">{{html maskName(username)}}</a></b></td>
			<td><b>${kakaoUserId}</b></td>

			{{if status == 'REJ' }}
				<td><b class="c_red">${amount}</b></td>
			{{else}}
				<td><b class="c_blue">${amount}</b></td>
			{{/if}}

			<td><b>${bankName}</b></td>
			<td><b>${accountNo}</b></td>
			<td>{{html dateToString(reqDate)}}</td>
			<td>{{html dateToString(modifiedDate)}}</td>
			<td><b>${modifiedName}</b></td>
		</tr>
	</script>
	
			  
	<script type="text/javascript">
	
		document.addEventListener('DOMContentLoaded', function () {
			currentPage =1;
			searchList();
			
		});
		
		// 목록 조회
		function searchList() {
			
			var page = currentPage;
			if(page =="" || page == null) page =1;
			var _recordSize =  parseInt($("#recordSize").val());
			
			if( !_isDateForm($("#searchStartDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchStartDt").focus();
				return;
			}
			if( !_isDateForm($("#searchEndDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchEndDt").focus();
				return;
			}
			console.log($("#searchStartDt").val());
			console.log($("#searchEndDt").val());
			var params = {
					 keyword				: $("#keyword").val()							// 입력 검색어 
			 		,searchStartDt			: $("#searchStartDt").val()						//BaseSearchDto		Dt 임, Date 아님
			 		,searchEndDt			: $("#searchEndDt").val()						//BaseSearchDto
			 		,status			: $("input[name='status']:checked").val()
			 		,page					: page
			 		,recordSize 			: _recordSize
			}
			
			$.ajax({
					 url : '/point/cash/ajaxCashList'
					,type : 'POST'
					,dataType : "json"
					,contentType:"application/json"
					,data : JSON.stringify(params)
					,success: function (data) {
						
						var items = data.data
						$('#searchList').empty();
						if(data.totalCnt == 0) {
							//
						} else {
							var totalCnt = data.totalCnt;
							$.each(data.data, function(idx, obj){
								obj.rIdx = totalCnt - ((params.page - 1) * params.recordSize + idx);
							});
							$('#searchListTmpl').tmpl(data.data).appendTo('#searchList');	
						}
						$('#totla_count').html("총 "+data.totalCnt+"건");
						renderPagination(params.page, data.totalCnt, params.recordSize)
					},
					error : function(request, status, error){
						alert(error);
					},
					complete:function(){
						// $('#loading').addClass('display-none');
					}
			});
		}
		
		
		//   -------------------------------------------- 컴포넌트 기본 --------------------------------------------   //
		
		//리스트화면 필수
		function renderPage(page) {
			currentPage = page;
			searchList();
		}
		//10개씩 보기
		function changeCombo(){
			currentPage = 1;
			searchList()
		}
		//초기화(조회조건)
		function toggleSearchInit(){
			$("#keyword").val('');
			$("#statusAll").prop('checked', true); 			//radio button : statusAll // id="statusPoint" value="point" , "cancel"
			periodButtonInit();
			currentPage = 1;
		}
		//리스트내 표현양식 사용
		function dateToString(date) {
			var str = '';
			if ( date != null ) {
				var temp = moment(date);
				str = temp.format('YYYY.MM.DD HH:mm:ss');
			}
			return str;
		}
		//   -------------------------------------------- 컴포넌트 기본 --------------------------------------------   //
		
		
		// Excel  -------------------------------------------------------------------------------------------------- Excel //
		function downloadExcel() {
			var page = 1;
			var _recordSize =  9999;
			if( !_isDateForm($("#searchStartDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchStartDt").focus();
				return;
			}
			if( !_isDateForm($("#searchEndDt").val()) ){
				alert("올바른 날짜를 넣어주세요");
				$("#searchEndDt").focus();
				return;
			}
			var params = {
					keyword					: $("#keyword").val()							// 입력 검색어 
			 		,searchStartDate		: $("#searchStartDt").val()						//BaseSearchDto
			 		,searchEndDate			: $("#searchEndDt").val()						//BaseSearchDto
			 		,status			: $("input[name='status']:checked").val()
			 		,page					: page
			 		,recordSize 			: _recordSize
			}
			var _url = '/point/cash/exceldown';
			downloadExcelProc(params, _url, "PointCashList");
		}
		
		// Excel  -------------------------------------------------------------------------------------------------- Excel //
		
	</script>
</th:block>

<div class="main-content">
			<div class="container-fluid">
				 <!-- 로케이션 & 제목 영역 추가 -->
				<div class="page-header mb-4">
					<div class="location mb-2">
						<small class="text-secondary">
							<i class="fas fa-home me-1"></i>
							<a href="/">홈</a> > <a href="/point/cash/list">포인트관리</a> > <a href="/point/cash/list">캐시백 신청 목록</a> >
						</small>
					</div>
					<h2 class="page-title fs-4 mb-4">캐시백 신청 목록</h2>
				</div>
				
				<div class="search-section">
					<div class="row g-3">
						<div class="col-12">
						
							<!-- 검색어 -->
							<div class="form-row full-width mb-3">
								<div class="form-label mb-0">검색어</div>
								<div class="form-control-wrap flex-grow-1">
									<input type="text" class="form-control" placeholder="검색어를 입력해주세요" id="keyword">
								</div>
							</div>
					
							<!-- 구분 -->
							<div class="form-row full-width mb-3">
								<div class="form-label mb-0">구분</div>
								<div class="form-control-wrap">
									<div class="form-check-group">
										<div class="form-check">
											<input class="form-check-input" type="radio" name="status" id="statusAll" value="" checked>
											<label class="form-check-label" for="statusAll">전체</label>
										</div>
										<div class="form-check">
											<input class="form-check-input" type="radio" name="status" id="statusReq" value="REQ"><!-- //'신청,처리완료,반려(REQ, COM, REJ:Submitted,Completed,Rejected)' -->
											<label class="form-check-label" for="statusReq">신청</label>
										</div>
										<div class="form-check">
											<input class="form-check-input" type="radio" name="status" id="statusCom"  value="COM">
											<label class="form-check-label" for="statusCom">처리완료</label>
										</div>
										<div class="form-check">
											<input class="form-check-input" type="radio" name="status" id="statusRej"  value="REJ">
											<label class="form-check-label" for="statusRej">반려</label>
										</div>
									</div>
								</div>
							</div>

							<!-- 처리일 -->
							<div class="col-12">
								<div class="form-row full-width">
									<div class="form-label mb-0">처리일</div>
									<div class="form-control-wrap d-flex align-items-center gap-2">
										<div class="d-flex align-items-center gap-2">
											<input type="date" class="form-control" id="searchStartDt">
											<span class="text-secondary">-</span>
											<input type="date" class="form-control" id="searchEndDt">
										</div>
										<div class="period-buttons">
											<div class="d-flex gap-2">
												<button class="period-button" value="30">최근 1개월</button>
												<button class="period-button" value="90">최근 3개월</button>
												<button class="period-button" value="180">최근 6개월</button>
												<button class="period-button" value="365">최근 1년</button>
											</div>
										</div>
									</div>
								</div>

								<div class="row">
									<div class="col-12 text-end mt-2">
										<button class="btn btn-primary btn-sm me-2" onclick="searchList()">
											<i class="fas fa-search"></i>
											검색
										</button>
										<button class="btn btn-light btn-sm" onclick="toggleSearchInit();">
											<i class="fas fa-redo"></i>
											초기화
										</button>
									</div>
								</div>
							</div>
						
						
						
						</div>
					</div>
				</div>
						
						
					

				<div class="table-section">
					<div class="d-flex justify-content-between align-items-center mb-4">
						<div class="d-flex align-items-center gap-3">
							<div class="stats-badge">
								<i class="fas fa-calculator me-1"></i>
								<span id="totla_count">총 450건</span>
							</div>
							<select class="form-select" style="width: 100px" id="recordSize" onchange="changeCombo()">
								<option value="10">10개씩</option>
								<option value="20">20개씩</option>
								<option value="30">30개씩</option>
								<option value="40">40개씩</option>
								<option value="50">50개씩</option>
							</select>
						</div>
						<div class="header-actions">
							
							<button class="btn btn-success btn-sm">
								<i class="fas fa-file-excel"></i>
								엑셀 다운로드
							</button>
							
						</div>
					</div>

					<table class="table custom-table">
						<thead>
							<tr>
								<th style="width:5%"	>번호</th>
								<th style="width:10%"	>상태</th>
								<th style="width: 7%"	>회원명</th>
								<th style="width:10%"	>카카오ID</th>
								<th style="width: 8%"	>전환금액</th>
								<th style="width: 8%"	>은행</th>
								<th style="width:10%"	>계좌번호</th>
								<th style="width:15%"	>신청일</th>
								<th style="width:15%"	>처리일</th>
								<th 					>담당자</th>
							</tr>
						</thead>
						<tbody id="searchList">
							
						</tbody>
					</table>

					<div class="d-flex justify-content-left mt-4">
						<ul class="pagination">
							
						</ul>
					</div>
				</div>
			</div>
			
			
</DIV>
