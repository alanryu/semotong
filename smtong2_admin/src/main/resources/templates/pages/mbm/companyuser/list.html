<!DOCTYPE html>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layout/default_layout}"
  layout:fragment="Content"
  th:with="menuIdGroup ='03',menuId ='02'"
>
  <!-- index.html 고유 CSS 추가 -->
  <th:block layout:fragment="css">
    <!--    <link rel="stylesheet" th:href="@{/css/page/home.css}" >-->
  </th:block>
  <!-- index.html 고유 스크립트 추가 -->
  <th:block layout:fragment="script">
    <script id="searchListTmpl" type="text/x-jquery-tmpl">
      <tr>
          <td>
              <input type="checkbox" class="form-check-input" value="${id}">
          </td>
          <td>${id}</td>
          <td>
              <div class="d-flex gap-2">
                  <button class="action-btn btn-sm" onclick="location.href='/mbm/companyuser/edit?id=${id}'">
                      <i class="fas fa-edit me-1"></i>
                      수정
                  </button>
                  <button class="action-btn btn-sm" onclick="deleteRow('${id}');">
                      <i class="fas fa-trash me-1"></i>
                      삭제
                  </button>
              </div>
          </td>
      	<td><a href="/mbm/companyuser/edit?id=${id}">${adminUserName}</a></td>
      	<td>${adminId}</td>
          <td>${companyNm}</td>
          <td>${businessNm}</td>
      	<td>${companyMno}</td>
          <td>{{html getDateStr(createDate)}}</td>
      </tr>
    </script>
    <script type="text/javascript">
      document.addEventListener("DOMContentLoaded", () => {
        searchList();

        document.getElementById("pageSize").addEventListener("change", function () {
          currentPage = 1;
          searchList();
        });
      });

      function changeCombo() {
        currentPage = 1;
        searchList();
      }

      function renderPage(page) {
        currentPage = page;
        searchList();
      }

      function deleteRow(delId) {
        showConfirm(
          "삭제하시겠습니까?",
          () => {
            deleteDb(delId);
          },
          () => {
            // 취소 시 실행할 로직
          },
          "계정 삭제"
        );
      }

      function deleteDb(id) {
        $.ajax({
          url: "/mbm/companyuser/delete",
          type: "DELETE",
          data: { delId: id },
          success: function (data) {
            searchList();
          },
          error: function (request, status, error) {
            showAlert(error);
          },
          complete: function () {
            // $('#loading').addClass('display-none');
          },
        });
      }

      function searchList() {
        var page = currentPage;
        if (page == null || page == "") page = 1;
        var pageSize = $("#pageSize").val();
        var searchDisabledYn = $("input[name='searchDisabledYn']:checked").val();
        var searchCompanyMno = $("input[name='searchCompanyMno']:checked").val();

        var params = {
          searchType: $("#searchType").val(),
          keyword: $("#keyword").val(),
          searchStartDt: $("#searchStartDt").val(),
          searchEndDt: $("#searchEndDt").val(),
          searchDisabledYn: searchDisabledYn,
          searchCompanyMno: searchCompanyMno,
          searchAuthType: "HOST",
          searchMenuType: "HOST",
          page: page,
          recordSize: pageSize,
        };

        $.ajax({
          url: "/mbm/companyuser/getlist",
          type: "POST",
          dataType: "json",
          contentType: "application/json",
          data: JSON.stringify(params),
          success: function (data) {
            $("#searchList").empty();

            $("#totla_count").html("총 " + data.totalCnt + "건");
            if (data.totalCnt > 0) {
              $("#searchListTmpl").tmpl(data.data).appendTo("#searchList");
            }

            renderPagination(page, data.totalCnt, pageSize);
          },
          error: function (request, status, error) {
            showAlert(error);
          },
          complete: function () {
            // $('#loading').addClass('display-none');
          },
        });
      }

      function toggleSearchInit() {
        $("#searchType").val("").prop("selected", true);
        $("#keyword").val("");

        $("#searchDisabledYne01").prop("checked", true);
        $("#searchCompanyMnoe01").prop("checked", true);

        $('.period-button[value="180"]').trigger("click");
        currentPage = 1;
      }

      function downloadExcel() {
        var page = 1;
        var pageSize = 999;

        var searchDisabledYn = $("input[name='searchDisabledYn']:checked").val();
        var searchCompanyMno = $("input[name='searchCompanyMno']:checked").val();

        var params = {
          searchType: $("#searchType").val(),
          keyword: $("#keyword").val(),
          searchStartDt: $("#searchStartDt").val(),
          searchEndDt: $("#searchEndDt").val(),
          searchDisabledYn: searchDisabledYn,
          searchCompanyMno: searchCompanyMno,
          searchAuthType: "HOST",
          searchMenuType: "HOST",
          page: page,
          recordSize: pageSize,
        };

        var _url = "/mbm/companyuser/exceldown";

        downloadExcelProc(params, _url, "companyUserList");
      }
    </script>
  </th:block>

  <div class="main-content">
    <div class="container-fluid">
      <!-- 로케이션 & 제목 영역 추가 -->
      <div class="page-header mb-4">
        <div class="location mb-2">
          <small class="text-secondary">
            <i class="fas fa-home me-1"></i>
            <a href="#">홈</a> > <a href="/mbm/company/list">입점사관리</a> > <a href="/mbm/companyuser/list">입점사관리</a>
          </small>
        </div>
        <h2 class="page-title fs-4 mb-4">입점사관리</h2>
      </div>

      <div class="search-section">
        <!-- 검색어 -->
        <div class="col-12 mb-2">
          <div class="form-row full-width">
            <div class="form-label mb-0">검색조건</div>
            <div class="form-control-wrap flex-grow-1">
              <select class="form-select" id="searchType" name="searchType">
                <option value="">전체</option>
                <option value="name">담당자</option>
                <option value="company_nm">입점사</option>
                <option value="admin_id">아이디</option>
              </select>
            </div>
            <div class="position-relative col-9">
              <i class="fas fa-search position-absolute" style="left: 16px; top: 15.5px; color: #94a3b8"></i>
              <input type="text" class="form-control ps-5" placeholder="검색어를 입력하세요" id="keyword" name="keyword" />
            </div>
          </div>
        </div>
        <div class="row align-items-center mb-2">
          <div class="form-row full-width">
            <div class="d-flex align-items-center gap-3">
              <div class="form-label mb-0">검색기간</div>
              <select class="form-select" style="width: 120px">
                <option>등록일자</option>
              </select>
              <div class="d-flex align-items-center gap-2">
                <input type="date" class="form-control" style="width: 150px" id="searchStartDt" />
                <span class="text-secondary">-</span>
                <input type="date" class="form-control" style="width: 150px" id="searchEndDt" />
              </div>
              <div class="d-flex gap-2">
                <button class="period-button" value="0">오늘</button>
                <button class="period-button" value="7">1주일</button>
                <button class="period-button" value="30">1개월</button>
                <button class="period-button" value="90">3개월</button>
                <button class="period-button" value="180">6개월</button>
                <button class="period-button" value="365">1년</button>
              </div>
            </div>
          </div>
        </div>
        <div class="row align-items-center mb-3">
          <div class="col-12">
            <div class="d-flex align-items-center gap-3">
              <div class="form-label mb-0">회원구분</div>
              <div class="radio-group">
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchDisabledYn" id="searchDisabledYne01" value="" checked />
                  <label class="form-check-label" for="searchDisabledYne01">전체</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchDisabledYn" id="searchDisabledYn02" value="Y" />
                  <label class="form-check-label" for="searchDisabledYn02">활동</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchDisabledYn" id="searchDisabledYn03" value="N" />
                  <label class="form-check-label" for="searchDisabledYn03">정지</label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row align-items-center mb-3">
          <div class="col-12">
            <div class="d-flex align-items-center gap-3">
              <div class="form-label mb-0">통신사 구분</div>
              <div class="radio-group">
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchCompanyMno" id="searchCompanyMnoe01" value="" checked />
                  <label class="form-check-label" for="searchCompanyMnoe01">전체</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchCompanyMno" id="searchCompanyMno02" value="SKT" />
                  <label class="form-check-label" for="searchCompanyMno02">SKT</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchCompanyMno" id="searchCompanyMno03" value="KT" />
                  <label class="form-check-label" for="searchCompanyMno03">KT</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="searchCompanyMno" id="searchCompanyMno04" value="LGU" />
                  <label class="form-check-label" for="searchCompanyMno04">U+</label>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-12 text-end mt-2">
            <button class="btn btn-light me-2 btn-sm" onclick="toggleSearchInit()">
              <i class="fas fa-redo"></i>
              초기화
            </button>
            <button class="btn btn-primary btn-sm" onclick="searchList();">
              <i class="fas fa-search"></i>
              검색
            </button>
          </div>
        </div>
      </div>

      <div class="table-section">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="d-flex align-items-center gap-3">
            <div class="stats-badge">
              <i class="fas fa-calculator me-1"></i>
              <span id="totla_count">총 450건</span>
            </div>
            <select class="form-select" style="width: 100px" id="pageSize" onchange="changeCombo()">
              <option value="10">10개씩</option>
              <option value="20">20개씩</option>
              <option value="30">30개씩</option>
              <option value="40">40개씩</option>
              <option value="50">50개씩</option>
            </select>
          </div>
          <div class="header-actions">
            <button class="btn btn-light btn-sm">
              <i class="fas fa-download"></i>
              다운로드
            </button>
            <button class="btn btn-primary btn-sm" onclick="location.href='/mbm/companyuser/edit?id='">
              <i class="fas fa-plus"></i>
              신규등록
            </button>
          </div>
        </div>

        <table class="table custom-table">
          <thead>
            <tr>
              <th>
                <input type="checkbox" class="form-check-input" />
              </th>
              <th>번호</th>
              <th>편집</th>
              <th>이름</th>
              <th>아이디</th>
              <th>사업자명</th>
              <th>회사</th>
              <th>통신사구분</th>
              <th>등록일</th>
            </tr>
          </thead>
          <tbody id="searchList"></tbody>
        </table>

        <div class="d-flex justify-content-left mt-4">
          <ul class="pagination"></ul>
        </div>
      </div>
    </div>
  </div>
</html>
